<!DOCTYPE html>
<html lang="en">
<head>
  <script src="theme.js"></script>
  <script src="i18n.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sign in — ROTA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            petrol: '#1F4B4C',
            amber:  '#E8A33D',
            clay:   '#C1573A',
            paper:  '#EDEEE7',
            ink:    '#14181C'
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen w-full flex items-center justify-center bg-ticket-field p-4">

  <!-- Toast -->
  <div id="toast" class="fixed top-5 right-5 z-50 hidden items-center gap-3 bg-petrol text-paper px-4 py-3 rounded-md shadow-xl transition-all duration-300 translate-x-full">
    <i data-lucide="check-circle" id="toastIcon" class="w-5 h-5 text-amber flex-shrink-0"></i>
    <span id="toastText" class="text-sm font-medium"></span>
  </div>

  <div class="w-full max-w-[420px] relative">
    <div class="bg-white border border-ink/10 rounded-lg shadow-[0_8px_28px_rgba(20,24,28,0.12)] p-8 pt-9 relative overflow-hidden">

      <!-- carimbo de sucesso, aparece ao "entrar" -->
      <div id="stampSuccess" class="stamp-pop absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
        <div class="border-[3px] border-clay text-clay font-display text-xl uppercase tracking-widest px-6 py-2 rounded-sm rotate-[-8deg] bg-white/90" data-i18n="login.approved">
          Approved
        </div>
      </div>

      <!-- alternância de idioma — só aqui e no cadastro/recuperação, já
           que ainda não tem Configurações antes de entrar -->
      <button id="langToggle" type="button" class="absolute top-3 left-4 font-mono-ticket text-[11px] text-ink/40 hover:text-ink tracking-wider transition px-2 py-1 rounded border border-ink/15" aria-label="Switch language"></button>

      <!-- Nº do bilhete, detalhe decorativo — gerado por sessão, não é dado real -->
      <div class="absolute top-3 right-4 font-mono-ticket text-[11px] text-ink/40 tracking-wider">
        <span data-i18n="login.ticketPrefix">No.</span> <span id="ticketNumber"></span>
      </div>

      <!-- Logo / carimbo -->
      <div class="text-center mb-7">
        <div class="w-14 h-14 bg-paper stamp-mark rounded-full mx-auto mb-4 flex items-center justify-center">
          <i data-lucide="compass" class="w-6 h-6 text-petrol"></i>
        </div>
        <h1 class="text-3xl font-display font-semibold text-ink tracking-tight">ROTA</h1>
        <p class="text-ink/50 text-sm mt-1" data-i18n="login.subtitle">Agency dashboard — sign in to continue</p>
      </div>

      <!-- SSO (visual apenas, sem função ainda) -->
      <button id="googleBtn" type="button" class="group w-full flex items-center justify-center gap-3 bg-white hover:bg-paper text-ink font-medium py-3 px-4 rounded-md border border-ink/15 transition-all duration-200 mb-6">
        <svg class="w-5 h-5 transition-transform group-hover:scale-110" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        <span data-i18n="login.google">Continue with Google</span>
      </button>

      <div class="relative mb-6 ticket-divider mx-4">
        <span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-white px-3 text-xs uppercase text-ink/40 font-medium" data-i18n="common.or">or</span>
      </div>

      <!-- Form: só validação de formato, sem checagem contra backend -->
      <form id="loginForm" novalidate class="space-y-5">
        <div>
          <label for="email" class="text-sm font-medium text-ink/70 mb-2 block" data-i18n="login.emailLabel">Email</label>
          <div class="relative">
            <i data-lucide="mail" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-ink/35 pointer-events-none"></i>
            <input type="email" id="email" required autocomplete="email" aria-describedby="emailError"
              class="w-full bg-white border border-ink/15 rounded-md pl-11 pr-4 py-3.5 text-ink placeholder-ink/35 focus:outline-none input-focus transition-all text-base" />
          </div>
          <p id="emailError" class="text-clay text-xs mt-1.5 h-4"></p>
        </div>

        <div>
          <div class="flex justify-between items-center mb-2">
            <label for="password" class="text-sm font-medium text-ink/70" data-i18n="login.passwordLabel">Password</label>
            <a href="forgot-password.html" class="text-sm text-petrol hover:text-ink transition font-medium" data-i18n="login.forgot">Forgot?</a>
          </div>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-ink/35 pointer-events-none"></i>
            <input type="password" id="password" required autocomplete="current-password" aria-describedby="passwordError"
              class="w-full bg-white border border-ink/15 rounded-md pl-11 pr-12 py-3.5 text-ink placeholder-ink/35 focus:outline-none input-focus transition-all text-base" />
            <button type="button" id="togglePassword" data-i18n-aria-label="login.showPassword" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-ink/35 hover:text-ink transition">
              <i data-lucide="eye" class="w-5 h-5"></i>
            </button>
          </div>
          <p id="capsWarning" class="text-amber text-xs mt-1.5 h-4"></p>
          <p id="passwordError" class="text-clay text-xs mt-1.5 h-4"></p>
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="remember" class="w-4 h-4 rounded border-ink/25 text-petrol focus:ring-2 focus:ring-petrol/40 focus:ring-offset-0" />
            <span class="text-sm text-ink/70" data-i18n="login.remember">Remember me</span>
          </label>
        </div>

        <button type="submit" id="submitBtn"
          class="btn-ticket w-full bg-amber hover:bg-amber/90 text-ink font-semibold py-3.5 px-4 transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <span id="btnText" data-i18n="login.submit">Sign in</span>
          <i data-lucide="loader-2" id="loader" class="w-5 h-5 animate-spin hidden"></i>
        </button>
      </form>

      <p class="text-center text-sm text-ink/50 mt-8">
        <span data-i18n="login.noAccount">Don't have an account?</span>
        <a href="register.html" class="text-petrol hover:text-ink font-semibold transition" data-i18n="login.createFree">Create for free</a>
      </p>

      <div class="barcode mt-7 -mx-8"></div>
    </div>
    <p class="text-center text-xs text-ink/40 mt-6" data-i18n="login.prototypeNotice">Prototype — login not yet connected to the backend</p>
  </div>

  <script>
    RotaI18n.register({
      en: {
        'login.approved': 'Approved',
        'login.ticketPrefix': 'No.',
        'login.subtitle': 'Agency dashboard — sign in to continue',
        'login.google': 'Continue with Google',
        'common.or': 'or',
        'login.emailLabel': 'Email',
        'login.passwordLabel': 'Password',
        'login.forgot': 'Forgot?',
        'login.showPassword': 'Show password',
        'login.hidePassword': 'Hide password',
        'login.remember': 'Remember me',
        'login.submit': 'Sign in',
        'login.submitting': 'Signing in...',
        'login.noAccount': "Don't have an account?",
        'login.createFree': 'Create for free',
        'login.prototypeNotice': 'Prototype — login not yet connected to the backend',
        'login.pageTitle': 'Sign in — ROTA',
        'login.errorEmail': 'Enter a valid email',
        'login.errorPasswordLength': 'Password needs 8+ characters',
        'login.capsLockOn': 'Caps Lock is on',
        'login.toastSuccess': 'Signed in successfully!',
      },
      pt: {
        'login.approved': 'Aprovado',
        'login.ticketPrefix': 'Nº',
        'login.subtitle': 'Painel da agência — entre para continuar',
        'login.google': 'Continuar com Google',
        'common.or': 'ou',
        'login.emailLabel': 'Email',
        'login.passwordLabel': 'Senha',
        'login.forgot': 'Esqueci',
        'login.showPassword': 'Mostrar senha',
        'login.hidePassword': 'Ocultar senha',
        'login.remember': 'Lembrar de mim',
        'login.submit': 'Entrar',
        'login.submitting': 'Entrando...',
        'login.noAccount': 'Não tem uma conta?',
        'login.createFree': 'Crie grátis',
        'login.prototypeNotice': 'Protótipo — login ainda não conectado ao backend',
        'login.pageTitle': 'Login — ROTA',
        'login.errorEmail': 'Digite um email válido',
        'login.errorPasswordLength': 'Senha precisa ter 8+ caracteres',
        'login.capsLockOn': 'Caps Lock está ativado',
        'login.toastSuccess': 'Login realizado com sucesso!',
      },
    });

    function aplicarIdioma() {
      RotaI18n.apply();
      document.title = RotaI18n.t('login.pageTitle');
      $('langToggle').textContent = RotaI18n.get() === 'pt' ? 'EN' : 'PT';
    }

    lucide.createIcons();
    let isSubmitting = false;

    const $ = (id) => document.getElementById(id);
    const email = $('email');
    const password = $('password');
    const remember = $('remember');

    const REMEMBER_KEY = 'rota_remembered_email';

    // Número de bilhete decorativo — gerado a cada carregamento, não é
    // dado de verdade (não existe "sessão AO-XXXX" real por trás).
    function gerarNumeroBilhete() {
      const letras = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
      const l = () => letras[Math.floor(Math.random() * letras.length)];
      const n = Math.floor(1000 + Math.random() * 9000);
      return `AO-${n}-${l()}${l()}`;
    }
    $('ticketNumber').textContent = gerarNumeroBilhete();

    aplicarIdioma();
    $('langToggle').onclick = () => { RotaI18n.toggle(); };
    RotaI18n.onChange(aplicarIdioma);

    // "Lembrar de mim": guarda só o email (nunca a senha) no dispositivo.
    // Se já tiver um email salvo, pré-preenche o campo e marca a checkbox.
    window.onload = () => {
      const savedEmail = localStorage.getItem(REMEMBER_KEY);
      if (savedEmail) {
        email.value = savedEmail;
        remember.checked = true;
        password.focus();
      } else {
        email.focus();
      }
    };

    const validateEmail = (val) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);

    const showError = (input, errorEl, message) => {
      input.classList.add('border-clay');
      errorEl.textContent = message;
      input.parentElement.classList.add('shake');
      setTimeout(() => input.parentElement.classList.remove('shake'), 400);
    }
    const clearError = (input, errorEl) => {
      input.classList.remove('border-clay');
      errorEl.textContent = '';
    }

    email.addEventListener('input', () => { if (email.value) clearError(email, $('emailError')); });
    password.addEventListener('input', () => { if (password.value) clearError(password, $('passwordError')); });

    password.addEventListener('keyup', (e) => {
      $('capsWarning').textContent = e.getModifierState('CapsLock') ? RotaI18n.t('login.capsLockOn') : '';
    });

    $('togglePassword').onclick = () => {
      const type = password.type === 'password' ? 'text' : 'password';
      password.type = type;
      $('togglePassword').setAttribute('aria-label', RotaI18n.t(type === 'text' ? 'login.hidePassword' : 'login.showPassword'));
      $('togglePassword').innerHTML = type === 'text' ? '<i data-lucide="eye-off" class="w-5 h-5"></i>' : '<i data-lucide="eye" class="w-5 h-5"></i>';
      lucide.createIcons();
    }

    const showToast = (msg, type = 'success') => {
      $('toastText').textContent = msg;
      $('toastIcon').setAttribute('data-lucide', type === 'success' ? 'check-circle' : 'x-circle');
      $('toastIcon').className = `w-5 h-5 flex-shrink-0 ${type === 'success' ? 'text-amber' : 'text-clay'}`;
      $('toast').classList.remove('hidden', 'translate-x-full');
      $('toast').classList.add('flex');
      setTimeout(() => {
        $('toast').classList.add('translate-x-full');
        setTimeout(() => $('toast').classList.add('hidden'), 300);
      }, 3000);
      lucide.createIcons();
    }

    // SEM CHAMADA AO BACKEND: só valida formato e segue pro dashboard,
    // pra você conseguir ver o fluxo funcionando antes do PHP existir.
    $('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSubmitting) return;

      let valid = true;
      if (!validateEmail(email.value)) { showError(email, $('emailError'), RotaI18n.t('login.errorEmail')); valid = false; }
      if (password.value.length < 8) { showError(password, $('passwordError'), RotaI18n.t('login.errorPasswordLength')); valid = false; }
      if (!valid) return;

      // Salva ou remove o email lembrado conforme o estado da checkbox
      if (remember.checked) {
        localStorage.setItem(REMEMBER_KEY, email.value);
      } else {
        localStorage.removeItem(REMEMBER_KEY);
      }

      isSubmitting = true;
      $('submitBtn').disabled = true;
      $('btnText').textContent = RotaI18n.t('login.submitting');
      $('loader').classList.remove('hidden');

      await new Promise(res => setTimeout(res, 800)); // só pra simular uma espera real

      $('stampSuccess').classList.add('show');
      setTimeout(() => {
        showToast(RotaI18n.t('login.toastSuccess'));
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
      }, 250);
    });
  </script>
</body>
</html>
