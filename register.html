<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Criar conta — ROTA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            petrol: '#1F4B4C',
            amber:  '#E8A33D',
            clay:   '#C1573A',
            paper:  '#EDEEE7',
            ink:    '#14181C'
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen w-full flex items-center justify-center bg-ticket-field p-4">

  <!-- Toast -->
  <div id="toast" class="fixed top-5 right-5 z-50 hidden items-center gap-3 bg-petrol text-paper px-4 py-3 rounded-md shadow-xl transition-all duration-300 translate-x-full">
    <i data-lucide="check-circle" id="toastIcon" class="w-5 h-5 text-amber flex-shrink-0"></i>
    <span id="toastText" class="text-sm font-medium"></span>
  </div>

  <div class="w-full max-w-[420px] relative">
    <div class="bg-white border border-ink/10 rounded-lg shadow-[0_8px_28px_rgba(20,24,28,0.12)] p-8 pt-9 relative overflow-hidden">

      <!-- carimbo de sucesso -->
      <div id="stampSuccess" class="stamp-pop absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
        <div class="border-[3px] border-clay text-clay font-display text-xl uppercase tracking-widest px-6 py-2 rounded-sm rotate-[-8deg] bg-white/90">
          Aprovado
        </div>
      </div>

      <!-- Nº do bilhete, detalhe decorativo -->
      <div class="absolute top-3 right-4 font-mono-ticket text-[11px] text-ink/40 tracking-wider">Nº AO-2891-KX</div>

      <!-- Logo / carimbo -->
      <div class="text-center mb-7">
        <div class="w-14 h-14 bg-paper stamp-mark rounded-full mx-auto mb-4 flex items-center justify-center">
          <i data-lucide="compass" class="w-6 h-6 text-petrol"></i>
        </div>
        <h1 class="text-3xl font-display font-semibold text-ink tracking-tight">ROTA</h1>
        <p class="text-ink/50 text-sm mt-1">Cria a conta da tua agência</p>
      </div>

      <!-- SSO (visual apenas, sem função ainda) -->
      <button id="googleBtn" type="button" class="group w-full flex items-center justify-center gap-3 bg-white hover:bg-paper text-ink font-medium py-3 px-4 rounded-md border border-ink/15 transition-all duration-200 mb-6">
        <svg class="w-5 h-5 transition-transform group-hover:scale-110" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar com Google
      </button>

      <div class="relative mb-6 ticket-divider mx-4">
        <span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-white px-3 text-xs uppercase text-ink/40 font-medium">ou</span>
      </div>

      <!-- Form: só validação de formato, sem checagem contra backend -->
      <form id="signupForm" novalidate class="space-y-5">
        <div>
          <label for="agencyName" class="text-sm font-medium text-ink/70 mb-2 block">Nome da agência</label>
          <div class="relative">
            <i data-lucide="briefcase" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-ink/35 pointer-events-none"></i>
            <input type="text" id="agencyName" required autocomplete="organization" aria-describedby="agencyNameError"
              class="w-full bg-white border border-ink/15 rounded-md pl-11 pr-4 py-3.5 text-ink placeholder-ink/35 focus:outline-none input-focus transition-all text-base" />
          </div>
          <p id="agencyNameError" class="text-clay text-xs mt-1.5 h-4"></p>
        </div>

        <div>
          <label for="fullName" class="text-sm font-medium text-ink/70 mb-2 block">Teu nome</label>
          <div class="relative">
            <i data-lucide="user" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-ink/35 pointer-events-none"></i>
            <input type="text" id="fullName" required autocomplete="name" aria-describedby="fullNameError"
              class="w-full bg-white border border-ink/15 rounded-md pl-11 pr-4 py-3.5 text-ink placeholder-ink/35 focus:outline-none input-focus transition-all text-base" />
          </div>
          <p id="fullNameError" class="text-clay text-xs mt-1.5 h-4"></p>
        </div>

        <div>
          <label for="email" class="text-sm font-medium text-ink/70 mb-2 block">Email</label>
          <div class="relative">
            <i data-lucide="mail" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-ink/35 pointer-events-none"></i>
            <input type="email" id="email" required autocomplete="email" aria-describedby="emailError"
              class="w-full bg-white border border-ink/15 rounded-md pl-11 pr-4 py-3.5 text-ink placeholder-ink/35 focus:outline-none input-focus transition-all text-base" />
          </div>
          <p id="emailError" class="text-clay text-xs mt-1.5 h-4"></p>
        </div>

        <div>
          <label for="password" class="text-sm font-medium text-ink/70 mb-2 block">Senha</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-ink/35 pointer-events-none"></i>
            <input type="password" id="password" required autocomplete="new-password" aria-describedby="passwordError"
              class="w-full bg-white border border-ink/15 rounded-md pl-11 pr-12 py-3.5 text-ink placeholder-ink/35 focus:outline-none input-focus transition-all text-base" />
            <button type="button" id="togglePassword" aria-label="Mostrar senha" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-ink/35 hover:text-ink transition">
              <i data-lucide="eye" class="w-5 h-5"></i>
            </button>
          </div>
          <p id="capsWarning" class="text-amber text-xs mt-1.5 h-4"></p>
          <p id="passwordError" class="text-clay text-xs mt-1.5 h-4"></p>
        </div>

        <div class="flex items-start gap-2.5">
          <input type="checkbox" id="terms" class="w-4 h-4 mt-0.5 rounded border-ink/25 text-petrol focus:ring-2 focus:ring-petrol/40 focus:ring-offset-0" />
          <label for="terms" class="text-sm text-ink/70 select-none">
            Aceito os <a href="#" class="text-petrol hover:text-ink font-medium transition">termos de uso</a>
          </label>
        </div>
        <p id="termsError" class="text-clay text-xs -mt-3 h-4"></p>

        <button type="submit" id="submitBtn"
          class="btn-ticket w-full bg-amber hover:bg-amber/90 text-ink font-semibold py-3.5 px-4 transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <span id="btnText">Criar conta</span>
          <i data-lucide="loader-2" id="loader" class="w-5 h-5 animate-spin hidden"></i>
        </button>
      </form>

      <p class="text-center text-sm text-ink/50 mt-8">Já tens uma conta? <a href="index.html" class="text-petrol hover:text-ink font-semibold transition">Entrar</a></p>

      <div class="barcode mt-7 -mx-8"></div>
    </div>
    <p class="text-center text-xs text-ink/40 mt-6">Protótipo — cadastro ainda não conectado ao backend</p>
  </div>

  <script>
    lucide.createIcons();
    let isSubmitting = false;

    const $ = (id) => document.getElementById(id);
    const agencyName = $('agencyName');
    const fullName = $('fullName');
    const email = $('email');
    const password = $('password');
    const terms = $('terms');

    window.onload = () => agencyName.focus();

    const validateEmail = (val) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);

    const showError = (input, errorEl, message) => {
      input.classList.add('border-clay');
      errorEl.textContent = message;
      input.parentElement.classList.add('shake');
      setTimeout(() => input.parentElement.classList.remove('shake'), 400);
    }
    const clearError = (input, errorEl) => {
      input.classList.remove('border-clay');
      errorEl.textContent = '';
    }

    agencyName.addEventListener('input', () => { if (agencyName.value) clearError(agencyName, $('agencyNameError')); });
    fullName.addEventListener('input', () => { if (fullName.value) clearError(fullName, $('fullNameError')); });
    email.addEventListener('input', () => { if (email.value) clearError(email, $('emailError')); });
    password.addEventListener('input', () => { if (password.value) clearError(password, $('passwordError')); });

    password.addEventListener('keyup', (e) => {
      $('capsWarning').textContent = e.getModifierState('CapsLock') ? 'Caps Lock está ativado' : '';
    });

    $('togglePassword').onclick = () => {
      const type = password.type === 'password' ? 'text' : 'password';
      password.type = type;
      $('togglePassword').innerHTML = type === 'text' ? '<i data-lucide="eye-off" class="w-5 h-5"></i>' : '<i data-lucide="eye" class="w-5 h-5"></i>';
      lucide.createIcons();
    }

    const showToast = (msg, type = 'success') => {
      $('toastText').textContent = msg;
      $('toastIcon').setAttribute('data-lucide', type === 'success' ? 'check-circle' : 'x-circle');
      $('toastIcon').className = `w-5 h-5 flex-shrink-0 ${type === 'success' ? 'text-amber' : 'text-clay'}`;
      $('toast').classList.remove('hidden', 'translate-x-full');
      $('toast').classList.add('flex');
      setTimeout(() => {
        $('toast').classList.add('translate-x-full');
        setTimeout(() => $('toast').classList.add('hidden'), 300);
      }, 3000);
      lucide.createIcons();
    }

    // SEM CHAMADA AO BACKEND: só valida formato e segue pro dashboard,
    // pra você conseguir ver o fluxo funcionando antes do Supabase existir.
    $('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSubmitting) return;

      let valid = true;
      if (!agencyName.value.trim()) { showError(agencyName, $('agencyNameError'), 'Digite o nome da agência'); valid = false; }
      if (!fullName.value.trim()) { showError(fullName, $('fullNameError'), 'Digite teu nome'); valid = false; }
      if (!validateEmail(email.value)) { showError(email, $('emailError'), 'Digite um email válido'); valid = false; }
      if (password.value.length < 8) { showError(password, $('passwordError'), 'Senha precisa ter 8+ caracteres'); valid = false; }
      if (!terms.checked) { $('termsError').textContent = 'Precisa aceitar os termos pra continuar'; valid = false; }
      else { $('termsError').textContent = ''; }
      if (!valid) return;

      isSubmitting = true;
      $('submitBtn').disabled = true;
      $('btnText').textContent = 'Criando conta...';
      $('loader').classList.remove('hidden');

      await new Promise(res => setTimeout(res, 800)); // só pra simular uma espera real

      $('stampSuccess').classList.add('show');
      setTimeout(() => {
        showToast('Conta criada com sucesso!');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
      }, 250);
    });
  </script>
</body>
</html>
