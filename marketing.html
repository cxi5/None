<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Marketing — ROTA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            petrol: '#1F4B4C',
            amber:  '#E8A33D',
            clay:   '#C1573A',
            paper:  '#EDEEE7',
            ink:    '#14181C'
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
  <script src="data.js"></script>
  <script src="modal.js"></script>
  <style>
    .pb-safe { padding-bottom: calc(84px + env(safe-area-inset-bottom)); }
    @media (min-width: 768px) { .pb-safe { padding-bottom: 2rem; } }

    .status-stamp {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 8px;
      border: 1.5px solid currentColor;
      border-radius: 3px;
      transform: rotate(-3deg);
      display: inline-block;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* dia em destaque na tira de datas */
    .day-chip.active { background: #1F4B4C; color: #EDEEE7; }
  </style>
</head>
<body class="min-h-screen bg-ticket-field">

  <div class="md:flex">

    <!-- Sidebar + bottom nav agora vêm do shell.js -->
    <div id="shell"></div>

    <!-- Conteúdo principal -->
    <main class="flex-1 pb-safe">

      <!-- Header -->
      <header class="flex items-center justify-between px-5 md:px-8 py-5 border-b border-ink/10 bg-white md:bg-transparent gap-3">
        <div>
          <p id="headerMonth" class="font-mono-ticket text-[11px] text-ink/40 tracking-wider mb-0.5">—</p>
          <h1 class="font-display text-2xl font-semibold text-ink">Marketing</h1>
        </div>
        <button id="newPostBtn" class="btn-ticket bg-amber hover:bg-amber/90 text-ink font-semibold text-sm px-4 py-2.5 flex items-center gap-2 flex-shrink-0">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Novo post</span>
        </button>
      </header>

      <div class="px-5 md:px-8 py-6">

        <!-- Tira de dias -->
        <div class="flex items-center gap-2 mb-6 overflow-x-auto pb-1">
          <div class="day-chip flex flex-col items-center justify-center w-14 h-16 rounded-lg bg-white border border-ink/10 flex-shrink-0">
            <span class="text-[10px] text-ink/40 font-mono-ticket">QUA</span>
            <span class="text-lg font-display font-semibold text-ink">08</span>
          </div>
          <div class="day-chip active flex flex-col items-center justify-center w-14 h-16 rounded-lg flex-shrink-0">
            <span class="text-[10px] font-mono-ticket opacity-70">QUI</span>
            <span class="text-lg font-display font-semibold">09</span>
            <span class="w-1.5 h-1.5 rounded-full bg-amber mt-0.5"></span>
          </div>
          <div class="day-chip flex flex-col items-center justify-center w-14 h-16 rounded-lg bg-white border border-ink/10 flex-shrink-0">
            <span class="text-[10px] text-ink/40 font-mono-ticket">SEX</span>
            <span class="text-lg font-display font-semibold text-ink">10</span>
          </div>
          <div class="day-chip flex flex-col items-center justify-center w-14 h-16 rounded-lg bg-white border border-ink/10 flex-shrink-0">
            <span class="text-[10px] text-ink/40 font-mono-ticket">SÁB</span>
            <span class="text-lg font-display font-semibold text-ink">11</span>
            <span class="w-1.5 h-1.5 rounded-full bg-petrol mt-0.5"></span>
          </div>
          <div class="day-chip flex flex-col items-center justify-center w-14 h-16 rounded-lg bg-white border border-ink/10 flex-shrink-0">
            <span class="text-[10px] text-ink/40 font-mono-ticket">DOM</span>
            <span class="text-lg font-display font-semibold text-ink">12</span>
          </div>
        </div>

        <!-- Filtros por rede -->
        <div class="flex items-center gap-2 mb-4 overflow-x-auto pb-1">
          <button class="px-3.5 py-1.5 rounded-full bg-petrol text-paper text-xs font-medium flex-shrink-0">Todas</button>
          <button class="px-3.5 py-1.5 rounded-full bg-white border border-ink/15 text-ink/60 text-xs font-medium flex-shrink-0">Instagram</button>
          <button class="px-3.5 py-1.5 rounded-full bg-white border border-ink/15 text-ink/60 text-xs font-medium flex-shrink-0">Facebook</button>
        </div>

        <!-- Lista de posts -->
        <div id="postList" class="space-y-3"></div>

      </div>
    </main>
  </div>

  <script src="shell.js"></script>
  <script>
    renderShell('marketing');

    const $ = (id) => document.getElementById(id);

    const hoje = new Date();
    $('headerMonth').textContent = hoje.toLocaleDateString('pt-PT', { month: 'short', year: 'numeric' }).replace('.', '').toUpperCase();

    const ICONE_REDE = { instagram: 'instagram', facebook: 'facebook' };
    const COR_REDE = { instagram: 'clay', facebook: 'petrol' };
    const STATUS_INFO = {
      ideia:     { label: 'Ideia',     cor: 'ink/30' },
      producao:  { label: 'Produção',  cor: 'ink/40' },
      agendado:  { label: 'Agendado',  cor: 'amber' },
      publicado: { label: 'Publicado', cor: 'ink' },
    };

    function renderPosts() {
      const posts = RotaDB.getPosts()
        .slice()
        .sort((a, b) => {
          // sem data primeiro por status (ideia/produção), com data por ordem cronológica
          if (!a.data_agendada && !b.data_agendada) return 0;
          if (!a.data_agendada) return 1;
          if (!b.data_agendada) return -1;
          return new Date(a.data_agendada) - new Date(b.data_agendada);
        });

      $('postList').innerHTML = posts.length
        ? posts.map(p => {
            const status = STATUS_INFO[p.status] || STATUS_INFO.ideia;
            const cor = COR_REDE[p.rede_social] || 'ink';
            const dataLabel = p.data_agendada ? RotaDB.formatDate(p.data_agendada, 'weekday') : 'Sem data ainda';
            return `
              <div class="bg-white border border-ink/10 rounded-lg p-4 flex items-start gap-3">
                <div class="w-10 h-10 rounded-full bg-${cor}/10 flex items-center justify-center flex-shrink-0">
                  <i data-lucide="${ICONE_REDE[p.rede_social] || 'megaphone'}" class="w-5 h-5 text-${cor}"></i>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center justify-between gap-2 mb-1">
                    <p class="text-sm font-semibold text-ink">${dataLabel}</p>
                    <span class="status-stamp text-${status.cor}">${status.label}</span>
                  </div>
                  <p class="text-sm text-ink/60 truncate">${p.texto || '(sem texto)'}</p>
                </div>
              </div>`;
          }).join('')
        : `<div class="bg-white border border-ink/10 rounded-lg p-8 text-center">
             <i data-lucide="calendar-plus" class="w-8 h-8 text-ink/25 mx-auto mb-2"></i>
             <p class="text-sm text-ink/40">Nenhum post cadastrado ainda.</p>
           </div>`;

      lucide.createIcons();
    }

    renderPosts();

    $('newPostBtn').onclick = () => {
      RotaModal.open({
        title: 'Novo post',
        submitLabel: 'Salvar post',
        bodyHtml: `
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="${ROTA_LABEL_CLASS}">Rede social *</label>
              <select id="f_rede" class="${ROTA_INPUT_CLASS}">
                <option value="instagram">Instagram</option>
                <option value="facebook">Facebook</option>
              </select>
            </div>
            <div>
              <label class="${ROTA_LABEL_CLASS}">Status *</label>
              <select id="f_status" class="${ROTA_INPUT_CLASS}">
                <option value="ideia">Ideia</option>
                <option value="producao">Produção</option>
                <option value="agendado">Agendado</option>
                <option value="publicado">Publicado</option>
              </select>
            </div>
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">Data agendada (opcional)</label>
            <input type="datetime-local" id="f_data" class="${ROTA_INPUT_CLASS}" />
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">Texto *</label>
            <textarea id="f_texto" rows="3" required class="${ROTA_INPUT_CLASS}" placeholder="O que vai no post"></textarea>
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">Link de referência</label>
            <input type="url" id="f_link" class="${ROTA_INPUT_CLASS}" placeholder="Link de imagem, vídeo ou rascunho" />
          </div>
        `,
        onSubmit: () => {
          const texto = $('f_texto').value.trim();
          if (!texto) { $('f_texto').focus(); return; }

          const dataLocal = $('f_data').value; // formato "YYYY-MM-DDTHH:mm", hora local
          RotaDB.savePost({
            rede_social: $('f_rede').value,
            status: $('f_status').value,
            data_agendada: dataLocal ? new Date(dataLocal).toISOString() : null,
            texto,
            link_referencia: $('f_link').value.trim(),
          });

          RotaModal.close();
          renderPosts();
        },
      });
    };
  </script>
</body>
</html>
