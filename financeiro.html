<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Financeiro — ROTA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            petrol: '#1F4B4C',
            amber:  '#E8A33D',
            clay:   '#C1573A',
            paper:  '#EDEEE7',
            ink:    '#14181C'
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
  <script src="data.js"></script>
  <script src="modal.js"></script>
  <style>
    .pb-safe { padding-bottom: calc(84px + env(safe-area-inset-bottom)); }
    @media (min-width: 768px) { .pb-safe { padding-bottom: 2rem; } }

    /* faixa colorida no topo dos cartões de saldo — como a faixa de classe num cartão de embarque */
    .currency-card { border-top: 4px solid; }
  </style>
</head>
<body class="min-h-screen bg-ticket-field">

  <div class="md:flex">

    <!-- Sidebar + bottom nav agora vêm do shell.js -->
    <div id="shell"></div>

    <!-- Conteúdo principal -->
    <main class="flex-1 pb-safe">

      <!-- Header -->
      <header class="flex items-center justify-between px-5 md:px-8 py-5 border-b border-ink/10 bg-white md:bg-transparent gap-3">
        <div>
          <p id="headerMonth" class="font-mono-ticket text-[11px] text-ink/40 tracking-wider mb-0.5">—</p>
          <h1 class="font-display text-2xl font-semibold text-ink">Financeiro</h1>
        </div>
        <button id="newTransactionBtn" class="btn-ticket bg-amber hover:bg-amber/90 text-ink font-semibold text-sm px-4 py-2.5 flex items-center gap-2 flex-shrink-0">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Novo lançamento</span>
        </button>
      </header>

      <div class="px-5 md:px-8 py-6">

        <!-- Saldos por moeda -->
        <div id="saldoCards" class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-8"></div>

        <!-- Filtros -->
        <div class="flex items-center gap-2 mb-4 overflow-x-auto pb-1">
          <button class="px-3.5 py-1.5 rounded-full bg-petrol text-paper text-xs font-medium flex-shrink-0">Todas</button>
          <button class="px-3.5 py-1.5 rounded-full bg-white border border-ink/15 text-ink/60 text-xs font-medium flex-shrink-0">AOA</button>
          <button class="px-3.5 py-1.5 rounded-full bg-white border border-ink/15 text-ink/60 text-xs font-medium flex-shrink-0">USD</button>
          <button class="px-3.5 py-1.5 rounded-full bg-white border border-ink/15 text-ink/60 text-xs font-medium flex-shrink-0">EUR</button>
        </div>

        <!-- Lançamentos -->
        <div class="bg-white border border-ink/10 rounded-lg overflow-hidden">
          <div class="px-5 py-4">
            <p class="text-xs font-mono-ticket text-ink/40 tracking-wider">LANÇAMENTOS RECENTES</p>
          </div>

          <ul id="transactionList" class="divide-y divide-ink/10"></ul>

          <div class="barcode mx-5 my-4"></div>
        </div>

      </div>
    </main>
  </div>

  <script src="shell.js"></script>
  <script>
    renderShell('financeiro');

    const $ = (id) => document.getElementById(id);

    // Cabeçalho do mês — dinâmico, no formato "JUL 2026"
    const hoje = new Date();
    $('headerMonth').textContent = hoje.toLocaleDateString('pt-PT', { month: 'short', year: 'numeric' }).replace('.', '').toUpperCase();

    const MOEDA_INFO = {
      AOA: { nome: 'Kwanza', cor: 'petrol' },
      USD: { nome: 'Dólar', cor: 'amber' },
      EUR: { nome: 'Euro', cor: 'clay' },
    };

    function renderSaldoCards() {
      const saldo = RotaDB.getSaldoPorMoeda();
      $('saldoCards').innerHTML = Object.entries(MOEDA_INFO).map(([moeda, info]) => `
        <div class="currency-card border-${info.cor} bg-white rounded-lg p-4">
          <p class="text-xs text-ink/50 font-medium mb-1">Saldo · ${info.nome}</p>
          <p class="font-mono-ticket text-2xl font-medium text-ink">${RotaDB.formatCurrency(saldo[moeda] || 0, moeda)}</p>
        </div>`).join('');
    }

    function renderTransactions() {
      const transacoes = RotaDB.getTransactions()
        .slice()
        .sort((a, b) => new Date(b.data) - new Date(a.data));

      $('transactionList').innerHTML = transacoes.length
        ? transacoes.map(t => {
            const cliente = t.client_id ? RotaDB.getClientById(t.client_id) : null;
            const receita = t.tipo === 'receita';
            const cor = receita ? 'petrol' : 'clay';
            const icone = receita ? 'arrow-down-left' : 'arrow-up-right';
            const subtitulo = cliente ? cliente.nome : (t.categoria || 'Sem categoria');
            return `
              <li class="flex items-center justify-between px-5 py-4">
                <div class="flex items-center gap-3">
                  <div class="w-9 h-9 rounded-full bg-${cor}/10 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="${icone}" class="w-4 h-4 text-${cor}"></i>
                  </div>
                  <div>
                    <p class="text-sm font-medium text-ink">${t.notas || (receita ? 'Receita' : 'Despesa')}</p>
                    <p class="text-xs text-ink/45">${subtitulo} · ${RotaDB.formatDate(t.data, 'short')}</p>
                  </div>
                </div>
                <div class="text-right">
                  <p class="font-mono-ticket text-sm font-medium text-${cor}">${receita ? '+' : '−'} ${RotaDB.formatCurrency(t.valor, t.moeda)}</p>
                  <p class="text-[11px] text-ink/35 font-mono-ticket">câmbio ${Number(t.taxa_cambio_no_momento).toFixed(2)}</p>
                </div>
              </li>`;
          }).join('')
        : `<li class="py-8 text-center text-sm text-ink/35 italic">Nenhum lançamento registrado ainda.</li>`;

      lucide.createIcons();
    }

    renderSaldoCards();
    renderTransactions();

    $('newTransactionBtn').onclick = () => {
      const opcoesClientes = RotaDB.getClients()
        .map(c => `<option value="${c.id}">${c.nome}</option>`).join('');

      RotaModal.open({
        title: 'Novo lançamento',
        submitLabel: 'Salvar lançamento',
        bodyHtml: `
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="${ROTA_LABEL_CLASS}">Tipo *</label>
              <select id="f_tipo" class="${ROTA_INPUT_CLASS}">
                <option value="receita">Receita</option>
                <option value="despesa">Despesa</option>
              </select>
            </div>
            <div>
              <label class="${ROTA_LABEL_CLASS}">Moeda *</label>
              <select id="f_moeda" class="${ROTA_INPUT_CLASS}">
                <option value="AOA">AOA</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="${ROTA_LABEL_CLASS}">Valor *</label>
              <input type="number" id="f_valor" min="0" step="0.01" required class="${ROTA_INPUT_CLASS}" placeholder="0,00" />
            </div>
            <div>
              <label class="${ROTA_LABEL_CLASS}">Câmbio no momento</label>
              <input type="number" id="f_cambio" min="0" step="0.01" value="1" class="${ROTA_INPUT_CLASS}" />
            </div>
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">Categoria</label>
            <input type="text" id="f_categoria" class="${ROTA_INPUT_CLASS}" placeholder="Pagamento cliente, fornecedor, marketing..." />
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">Cliente vinculado</label>
            <select id="f_cliente" class="${ROTA_INPUT_CLASS}">
              <option value="">— Nenhum —</option>
              ${opcoesClientes}
            </select>
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">Notas</label>
            <input type="text" id="f_notas" class="${ROTA_INPUT_CLASS}" placeholder="Descrição do lançamento" />
          </div>
        `,
        onSubmit: () => {
          const valor = parseFloat($('f_valor').value);
          if (!valor || valor <= 0) { $('f_valor').focus(); return; }

          RotaDB.saveTransaction({
            tipo: $('f_tipo').value,
            moeda: $('f_moeda').value,
            valor,
            taxa_cambio_no_momento: parseFloat($('f_cambio').value) || 1,
            categoria: $('f_categoria').value.trim(),
            client_id: $('f_cliente').value || null,
            notas: $('f_notas').value.trim(),
            data: new Date().toISOString(),
          });

          RotaModal.close();
          renderSaldoCards();
          renderTransactions();
        },
      });
    };
  </script>
</body>
</html>
