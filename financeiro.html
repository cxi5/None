<!DOCTYPE html>
<html lang="en">
<head>
  <script src="theme.js"></script>
  <script src="i18n.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Financeiro — ROTA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            petrol: '#1F4B4C',
            amber:  '#E8A33D',
            clay:   '#C1573A',
            paper:  '#EDEEE7',
            ink:    '#14181C'
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <script src="data.js"></script>
  <script src="modal.js"></script>
  <style>
    .pb-safe { padding-bottom: calc(84px + env(safe-area-inset-bottom)); }
    @media (min-width: 768px) { .pb-safe { padding-bottom: 2rem; } }

    /* evita "flash" de conteúdo vazio enquanto a sessão é verificada */
    #financeiroShell { visibility: hidden; }

    /* faixa colorida no topo dos cartões de saldo — como a faixa de classe num cartão de embarque */
    .currency-card { border-top: 4px solid; }
  </style>
</head>
<body class="min-h-screen bg-ticket-field">

  <div id="financeiroShell" class="md:flex">

    <!-- Sidebar + bottom nav agora vêm do shell.js -->
    <div id="shell"></div>

    <!-- Conteúdo principal -->
    <main class="flex-1 pb-safe">

      <!-- Header -->
      <header class="flex items-center justify-between px-5 md:px-8 py-5 border-b border-ink/10 bg-white md:bg-transparent gap-3">
        <div>
          <p id="headerMonth" class="font-mono-ticket text-[11px] text-ink/40 tracking-wider mb-0.5">—</p>
          <h1 class="font-display text-2xl font-semibold text-ink" data-i18n="financeiro.title">Finance</h1>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <button id="newTransactionBtn" class="btn-ticket bg-amber hover:bg-amber/90 text-ink font-semibold text-sm px-4 py-2.5 flex items-center gap-2 flex-shrink-0">
            <i data-lucide="plus" class="w-4 h-4"></i>
            <span class="hidden sm:inline" data-i18n="financeiro.newTransaction">New transaction</span>
          </button>
        </div>
      </header>

      <div class="px-5 md:px-8 py-6">

        <!-- Saldos por moeda -->
        <div id="saldoCards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-2"></div>

        <!-- Saldo de moedas que têm lançamento mas não estão mais ativas — nunca escondemos dado -->
        <div id="saldoForaAtiva" class="hidden mb-6"></div>

        <!-- Filtros por moeda -->
        <div id="moedaChips" class="flex items-center gap-2 mb-4 overflow-x-auto pb-1"></div>

        <!-- Filtro por período -->
        <div class="flex flex-wrap items-center gap-2 mb-4">
          <label for="dataInicio" class="text-xs text-ink/45 font-medium" data-i18n="financeiro.from">From</label>
          <input type="date" id="dataInicio" class="bg-white border border-ink/15 rounded-md px-3 py-2 text-sm text-ink focus:outline-none input-focus" />
          <label for="dataFim" class="text-xs text-ink/45 font-medium" data-i18n="financeiro.to">to</label>
          <input type="date" id="dataFim" class="bg-white border border-ink/15 rounded-md px-3 py-2 text-sm text-ink focus:outline-none input-focus" />
          <button id="limparPeriodo" class="hidden text-xs text-petrol hover:text-ink font-medium underline underline-offset-2" data-i18n="financeiro.clearPeriod">Clear period</button>
        </div>

        <!-- Filtro por cliente / agente -->
        <div class="flex flex-col sm:flex-row gap-3 mb-4">
          <select id="clienteFiltro" class="bg-white border border-ink/15 rounded-md px-3.5 py-2.5 text-sm text-ink focus:outline-none input-focus sm:max-w-[240px]">
            <option value="" data-i18n="financeiro.allClients">All clients</option>
          </select>
          <!-- só aparece pra admin — agente só vê os próprios lançamentos, sem precisar filtrar -->
          <select id="agenteFiltro" class="hidden bg-white border border-ink/15 rounded-md px-3.5 py-2.5 text-sm text-ink focus:outline-none input-focus sm:max-w-[220px]">
            <option value="" data-i18n="financeiro.allAgents">All agents</option>
          </select>
        </div>

        <!-- Evolução financeira -->
        <div class="bg-white border border-ink/10 rounded-lg p-5 mb-6">
          <div class="flex items-center justify-between gap-3 mb-0.5 flex-wrap">
            <p class="text-xs font-mono-ticket text-ink/40 tracking-wider" data-i18n="financeiro.evolution">FINANCIAL EVOLUTION</p>
            <div id="granularidadeChips" class="flex items-center gap-1.5 flex-shrink-0"></div>
          </div>
          <p class="text-[11px] text-ink/35 mb-3" data-i18n="financeiro.evolutionHint">Accumulated balance per currency, within the filters applied above.</p>
          <div id="chartEmptyState" class="hidden text-sm text-ink/35 italic text-center py-10"></div>
          <div class="relative" style="height: 240px;">
            <canvas id="evolucaoChart"></canvas>
          </div>
        </div>

        <!-- Lançamentos -->
        <div class="bg-white border border-ink/10 rounded-lg overflow-hidden">
          <div class="px-5 py-4 flex items-center justify-between gap-3">
            <p class="text-xs font-mono-ticket text-ink/40 tracking-wider" data-i18n="financeiro.recentTransactions">RECENT TRANSACTIONS</p>
            <div class="flex items-center gap-1 flex-shrink-0">
              <button id="exportCsvBtn" class="flex items-center gap-1.5 text-xs font-medium text-ink/50 hover:text-petrol px-2.5 py-1.5 rounded-md hover:bg-paper transition" data-i18n-title="financeiro.exportCsvTitle" title="Export filtered list as CSV">
                <i data-lucide="file-spreadsheet" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline">CSV</span>
              </button>
              <button id="exportPdfBtn" class="flex items-center gap-1.5 text-xs font-medium text-ink/50 hover:text-clay px-2.5 py-1.5 rounded-md hover:bg-paper transition" data-i18n-title="financeiro.exportPdfTitle" title="Export filtered list as PDF">
                <i data-lucide="file-text" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline">PDF</span>
              </button>
            </div>
          </div>

          <ul id="transactionList" class="divide-y divide-ink/10"></ul>

          <div class="barcode mx-5 my-4"></div>
        </div>

        <!-- Paginação — só aparece quando passa de uma página -->
        <div id="pagination" class="hidden items-center justify-between mt-4"></div>

      </div>
    </main>
  </div>

          'financeiro.thisExpense': 'esta despesa',

          'financeiro.filterAgent': 'Agente: {{nome}}',
          'financeiro.noFilters': 'Todos os lançamentos, sem filtro',
          'financeiro.noTransactionsToExport': 'Nenhum lançamento pra exportar com esses filtros.',
          'financeiro.csvHeaders': 'Data,Tipo,Moeda,Valor,Câmbio,Categoria,Cliente,Agente,Check-in,Check-out,Notas',
          'financeiro.pdfHeaders': 'Data,Tipo,Valor,Categoria,Cliente,Notas',
          'financeiro.generatedOn': 'Gerado em {{data}}',
          'financeiro.noneDash': '—',
        },
      });
    }

    const $ = (id) => document.getElementById(id);

    // Evita XSS quando o texto vem de campo livre digitado pela pessoa
    // (notas de lançamento, nome de cliente/agente etc.).
    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    // Redesenha o gráfico quando o tema muda (cor de texto/grade do Chart.js
    // não é CSS, então precisa disso além da troca de classe .dark).
    RotaTheme.onChange(() => { if (evolucaoChartInstance) renderEvolucaoChart(); });

    // Quem está logado (via sessão real do Supabase) e se é admin — mesmo
    // padrão de clients.html: agente só vê os próprios lançamentos, admin
    // vê tudo (ou filtra por agente). Preenchidos no boot().
    let usuarioAtual = null;
    let meuMembro = null;
    let souAdmin = false;
    let equipeCache = [];   // evita rebuscar a equipe em todo render
    let clientesCache = []; // idem para clientes (nome, lookup por id)

    // Cabeçalho do mês — dinâmico, no formato "JUL 2026" / "JUL 2026"
    const hoje = new Date();
    const localeFinanceiro = () => (RotaI18n.get() === 'en' ? 'en-US' : 'pt-PT');

    // Renderiza os cards de saldo com base nas moedas que o usuário ativou —
    // nada de moeda fixa. Se não houver nenhuma ativa, mostra um estado
    // vazio guiando pra configuração em vez de simplesmente não mostrar nada.
    async function renderSaldoCards() {
      const ativas = await RotaDB.getMoedasAtivas();
      const saldo = await RotaDB.getSaldoPorMoeda();

      $('saldoCards').innerHTML = ativas.length
        ? ativas.map(moeda => `
            <div class="currency-card border-${RotaDB.corMoeda(moeda)} bg-white rounded-lg p-4">
              <p class="text-xs text-ink/50 font-medium mb-1">${RotaI18n.t('financeiro.balanceOf', { moeda: RotaDB.nomeMoeda(moeda) })}</p>
              <p class="font-mono-ticket text-2xl font-medium text-ink">${RotaDB.formatCurrency(saldo[moeda] || 0, moeda)}</p>
            </div>`).join('')
        : `<div class="sm:col-span-2 lg:col-span-4 bg-white border border-dashed border-ink/20 rounded-lg p-6 text-center">
             <i data-lucide="coins" class="w-7 h-7 text-ink/25 mx-auto mb-2"></i>
             <p class="text-sm text-ink/50 mb-3">${RotaI18n.t('financeiro.noCurrencyConfigured')}</p>
             <button id="configMoedasBtnVazio" class="text-sm text-petrol hover:text-ink font-semibold transition">${RotaI18n.t('financeiro.configureCurrencies')}</button>
           </div>`;

      if (!ativas.length) {
        $('configMoedasBtnVazio').onclick = abrirConfigMoedas;
      }

      // Moedas com lançamento mas fora da lista ativa (ex.: foram desativadas
      // depois de já ter dado com elas) — mostra num rodapé discreto, nunca some.
      const fora = await RotaDB.getMoedasForaDaAtiva();
      if (fora.length) {
        $('saldoForaAtiva').classList.remove('hidden');
        $('saldoForaAtiva').innerHTML = `
          <p class="text-xs text-ink/40 leading-relaxed">
            ${RotaI18n.t('financeiro.alsoHasTransactionsIn', { lista: fora.map(m => `<strong class="text-ink/60">${RotaDB.nomeMoeda(m)} (${m})</strong>`).join(', ') })}
            ${RotaI18n.t('financeiro.outsideActiveCurrencies', { saldo: fora.map(m => RotaDB.formatCurrency(saldo[m] || 0, m)).join(' · ') })}
            <button id="reativarMoedaLink" class="text-petrol hover:text-ink font-medium underline underline-offset-2">${RotaI18n.t('financeiro.configureCurrencies')}</button>
          </p>`;
        $('reativarMoedaLink').onclick = abrirConfigMoedas;
      } else {
        $('saldoForaAtiva').classList.add('hidden');
        $('saldoForaAtiva').innerHTML = '';
      }

      lucide.createIcons();
    }

    // Moeda selecionada pro filtro — null significa "Todas". Fica em memória
    // (não precisa persistir entre sessões, é só um filtro de visualização).
    let moedaFiltro = null;

    const TAMANHO_PAGINA = 10;
    let paginaAtual = 1;

    // Mesmos valores hex do tailwind.config no topo do arquivo — o Chart.js
    // não lê classes Tailwind, então precisa da cor em hex direto.
    const CORES_HEX_MOEDA = { petrol: '#1F4B4C', amber: '#E8A33D', clay: '#C1573A', ink: '#14181C' };
    let evolucaoChartInstance = null;

    // Chart.js desenha em <canvas> — CSS não alcança texto/grade dele, então
    // o tema entra aqui manualmente. Reaproveita a cor do texto do app (tinta
    // no claro, papel no escuro) em vez de inventar uma paleta só do gráfico.
    function corTextoChart() {
      return RotaTheme.get() === 'dark' ? 'rgba(237,238,231,0.7)' : 'rgba(20,24,28,0.7)';
    }
    function corGradeChart() {
      return RotaTheme.get() === 'dark' ? 'rgba(237,238,231,0.08)' : 'rgba(20,24,28,0.08)';
    }

    // Granularidade do eixo de tempo do gráfico — dia, mês ou ano.
    // Fica em memória (não precisa persistir), começa em "mês" porque é
    // a visão mais útil quando ainda não tem filtro de período aplicado.
    let granularidadeChart = 'mes';
    const LABEL_GRANULARIDADE = () => ({ dia: RotaI18n.t('financeiro.day'), mes: RotaI18n.t('financeiro.month'), ano: RotaI18n.t('financeiro.year') });

    function renderGranularidadeChips() {
      const chipBase = 'px-3 py-1 rounded-full text-[11px] font-medium flex-shrink-0 transition';
      const chipAtivo = `${chipBase} bg-petrol text-paper`;
      const chipInativo = `${chipBase} bg-white border border-ink/15 text-ink/50 hover:border-ink/30`;

      $('granularidadeChips').innerHTML = Object.entries(LABEL_GRANULARIDADE())
        .map(([valor, label]) => `<button class="${granularidadeChart === valor ? chipAtivo : chipInativo}" onclick="selecionarGranularidade('${valor}')">${label}</button>`)
        .join('');
    }

    function selecionarGranularidade(valor) {
      granularidadeChart = valor;
      renderGranularidadeChips();
      renderEvolucaoChart();
    }

    // Chips por moeda ativa — clicar troca o filtro e re-renderiza tanto os
    // próprios chips (pra destacar o selecionado) quanto a lista de lançamentos.
    async function renderMoedaChips() {
      const ativas = await RotaDB.getMoedasAtivas();
      const chipBase = 'px-3.5 py-1.5 rounded-full text-xs font-medium flex-shrink-0 transition';
      const chipAtivo = `${chipBase} bg-petrol text-paper`;
      const chipInativo = `${chipBase} bg-white border border-ink/15 text-ink/60 hover:border-ink/30`;

      $('moedaChips').innerHTML = `
        <button class="${moedaFiltro === null ? chipAtivo : chipInativo}" onclick="selecionarMoedaFiltro(null)">${RotaI18n.t('financeiro.all')}</button>
        ${ativas.map(m => `<button class="${moedaFiltro === m ? chipAtivo : chipInativo}" onclick="selecionarMoedaFiltro('${m}')">${m}</button>`).join('')}
      `;
    }

    function selecionarMoedaFiltro(moeda) {
      moedaFiltro = moeda;
      paginaAtual = 1;
      renderMoedaChips();
      renderTransactions();
    }

    async function abrirConfigMoedas() {
      const ativas = new Set(await RotaDB.getMoedasAtivas());
      const opcoesHtml = Object.entries(RotaDB.CATALOGO_MOEDAS)
        .map(([codigo, nome]) => `
          <label class="flex items-center gap-2.5 py-1.5 cursor-pointer select-none">
            <input type="checkbox" class="moedaCheckbox w-4 h-4 rounded border-ink/25 text-petrol focus:ring-2 focus:ring-petrol/40" value="${codigo}" ${ativas.has(codigo) ? 'checked' : ''} />
            <span class="text-sm text-ink/80">${nome} <span class="text-ink/40 font-mono-ticket text-xs">${codigo}</span></span>
          </label>`).join('');

      RotaModal.open({
        title: RotaI18n.t('financeiro.configureCurrenciesTitle'),
        submitLabel: RotaI18n.t('financeiro.saveCurrencies'),
        bodyHtml: `
          <p class="text-xs text-ink/45 mb-1">${RotaI18n.t('financeiro.chooseUpTo', { limite: RotaDB.LIMITE_MOEDAS_ATIVAS })}</p>
          <p id="limiteAviso" class="hidden text-clay text-xs -mt-1"></p>
          <div class="max-h-72 overflow-y-auto divide-y divide-ink/5 -mx-1 px-1">${opcoesHtml}</div>
        `,
        onSubmit: async () => {
          const escolhidas = Array.from(document.querySelectorAll('.moedaCheckbox:checked')).map(el => el.value);

          // O checkbox já trava a marcação além do limite (ver atualizarLimite
          // abaixo), mas essa validação fica como segunda linha de defesa —
          // caso contrário um valor acima do limite seria silenciosamente
          // cortado pelo saveMoedasAtivas, sem avisar o usuário.
          if (escolhidas.length > RotaDB.LIMITE_MOEDAS_ATIVAS) {
            $('limiteAviso').textContent = RotaI18n.t('financeiro.maxCurrencies', { limite: RotaDB.LIMITE_MOEDAS_ATIVAS });
            $('limiteAviso').classList.remove('hidden');
            return;
          }

          const resultado = await RotaDB.saveMoedasAtivas(escolhidas);
          if (!resultado) return; // erro já logado dentro de RotaDB

          RotaModal.close();
          if (moedaFiltro && !resultado.includes(moedaFiltro)) moedaFiltro = null;
          await renderSaldoCards();
          await renderMoedaChips();
          await renderTransactions();
        },
      });

      // Trava a marcação de novos checkboxes quando já se atingiu o limite,
      // mas deixa desmarcar os que já estão marcados normalmente.
      const checkboxes = document.querySelectorAll('.moedaCheckbox');
      const atualizarLimite = () => {
        const marcados = document.querySelectorAll('.moedaCheckbox:checked').length;
        checkboxes.forEach(cb => { cb.disabled = !cb.checked && marcados >= RotaDB.LIMITE_MOEDAS_ATIVAS; });
        $('limiteAviso').classList.add('hidden');
      };
      checkboxes.forEach(cb => cb.addEventListener('change', atualizarLimite));
      atualizarLimite();
    }

    // Compara só a data (ignora hora) — "até" inclui o dia inteiro, senão um
    // lançamento feito às 18h do último dia escolhido ficaria de fora.
    function passaFiltroPeriodo(t) {
      const dataTransacao = new Date(t.data);
      const inicio = $('dataInicio').value ? new Date(`${$('dataInicio').value}T00:00:00`) : null;
      const fim = $('dataFim').value ? new Date(`${$('dataFim').value}T23:59:59`) : null;
      if (inicio && dataTransacao < inicio) return false;
      if (fim && dataTransacao > fim) return false;
      return true;
    }

    // Aplica os 4 filtros (moeda, período, cliente, agente/visibilidade) e
    // devolve em ordem cronológica — tanto a lista quanto o gráfico partem
    // daqui, cada um decidindo depois como ordenar/agrupar o resultado.
    async function getTransacoesFiltradas() {
      let transacoes = (await RotaDB.getTransactions()).slice();

      if (moedaFiltro) {
        transacoes = transacoes.filter(t => t.moeda === moedaFiltro);
      }
      transacoes = transacoes.filter(passaFiltroPeriodo);

      // visibilidade por agente: agente só vê os próprios, admin vê tudo
      // (ou filtra por um agente específico, se escolher no select)
      if (!souAdmin) {
        transacoes = meuMembro ? transacoes.filter(t => t.agente_id === meuMembro.id) : [];
      } else if ($('agenteFiltro').value) {
        transacoes = transacoes.filter(t => t.agente_id === $('agenteFiltro').value);
      }

      if ($('clienteFiltro').value) {
        transacoes = transacoes.filter(t => t.client_id === $('clienteFiltro').value);
      }

      return transacoes.sort((a, b) => new Date(a.data) - new Date(b.data));
    }

    async function renderTransactions() {
      const transacoes = (await getTransacoesFiltradas()).slice().sort((a, b) => new Date(b.data) - new Date(a.data));

      const semPeriodo = !$('dataInicio').value && !$('dataFim').value;

      // Paginação — só entra em jogo quando passa de TAMANHO_PAGINA lançamentos
      const totalPaginas = Math.max(1, Math.ceil(transacoes.length / TAMANHO_PAGINA));
      if (paginaAtual > totalPaginas) paginaAtual = totalPaginas;
      const inicio = (paginaAtual - 1) * TAMANHO_PAGINA;
      const transacoesPagina = transacoes.slice(inicio, inicio + TAMANHO_PAGINA);

      $('transactionList').innerHTML = transacoes.length
        ? transacoesPagina.map(t => {
            const cliente = t.client_id ? clientesCache.find(c => c.id === t.client_id) : null;
            const receita = t.tipo === 'receita';
            const cor = receita ? 'petrol' : 'clay';
            const icone = receita ? 'arrow-down-left' : 'arrow-up-right';
            const subtitulo = cliente ? cliente.nome : (t.categoria || RotaI18n.t('financeiro.noCategory'));
            // Quando o lançamento tem check-in/check-out, mostra o horário de
            // entrada (e saída, se houver) em vez da data genérica — é a
            // informação mais precisa disponível pra esse lançamento.
            const infoHorario = t.check_in
              ? `${RotaI18n.t('financeiro.checkInPrefix')} ${RotaDB.formatDate(t.check_in, 'datetime')}${t.check_out ? ` · ${RotaI18n.t('financeiro.checkOutPrefix')} ${RotaDB.formatDate(t.check_out, 'datetime')}` : ''}`
              : RotaDB.formatDate(t.data, 'short');
            return `
              <li class="flex items-center justify-between px-5 py-4 group">
                <div class="flex items-center gap-3 min-w-0">
                  <div class="w-9 h-9 rounded-full bg-${cor}/10 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="${icone}" class="w-4 h-4 text-${cor}"></i>
                  </div>
                  <div class="min-w-0">
                    <p class="text-sm font-medium text-ink truncate">${t.notas ? escapeHtml(t.notas) : (receita ? RotaI18n.t('financeiro.income') : RotaI18n.t('financeiro.expense'))}</p>
                    <p class="text-xs text-ink/45 truncate">${subtitulo} · ${infoHorario}</p>
                  </div>
                </div>
                <div class="flex items-center gap-3 flex-shrink-0">
                  <div class="text-right">
                    <p class="font-mono-ticket text-sm font-medium text-${cor}">${receita ? '+' : '−'} ${RotaDB.formatCurrency(t.valor, t.moeda)}</p>
                    <p class="text-[11px] text-ink/35 font-mono-ticket">${RotaI18n.t('financeiro.exchangeRate')} ${Number(t.taxa_cambio_no_momento).toFixed(2)}</p>
                  </div>
                  <div class="flex items-center gap-1 opacity-60 group-hover:opacity-100 transition">
                    <button onclick="editarTransacao('${t.id}')" class="w-8 h-8 flex items-center justify-center rounded-md text-ink/40 hover:text-petrol hover:bg-paper transition" aria-label="${RotaI18n.t('financeiro.editTransaction')}" title="${RotaI18n.t('financeiro.edit')}">
                      <i data-lucide="pencil" class="w-4 h-4"></i>
                    </button>
                    <button onclick="excluirTransacao('${t.id}')" class="w-8 h-8 flex items-center justify-center rounded-md text-ink/40 hover:text-clay hover:bg-paper transition" aria-label="${RotaI18n.t('financeiro.deleteTransaction')}" title="${RotaI18n.t('financeiro.delete')}">
                      <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                  </div>
                </div>
              </li>`;
          }).join('')
        : `<li class="py-8 text-center text-sm text-ink/35 italic">${
            moedaFiltro || !semPeriodo || $('clienteFiltro').value || $('agenteFiltro').value
              ? RotaI18n.t('financeiro.noResultsFilter')
              : RotaI18n.t('financeiro.noResultsEmpty')
          }</li>`;

      renderPagination(totalPaginas);
      await renderEvolucaoChart();
      lucide.createIcons();
    }

    function renderPagination(totalPaginas) {
      if (totalPaginas <= 1) {
        $('pagination').classList.add('hidden');
        $('pagination').classList.remove('flex');
        return;
      }

      $('pagination').classList.remove('hidden');
      $('pagination').classList.add('flex');
      $('pagination').innerHTML = `
        <button id="pagAnterior" ${paginaAtual === 1 ? 'disabled' : ''}
          class="flex items-center gap-1.5 px-3.5 py-2 rounded-md border border-ink/15 text-sm font-medium text-ink/70 hover:bg-white transition disabled:opacity-40 disabled:cursor-not-allowed">
          <i data-lucide="chevron-left" class="w-4 h-4"></i> ${RotaI18n.t('financeiro.previous')}
        </button>
        <span class="text-xs font-mono-ticket text-ink/40">${RotaI18n.t('financeiro.pageOf', { atual: paginaAtual, total: totalPaginas })}</span>
        <button id="pagProxima" ${paginaAtual === totalPaginas ? 'disabled' : ''}
          class="flex items-center gap-1.5 px-3.5 py-2 rounded-md border border-ink/15 text-sm font-medium text-ink/70 hover:bg-white transition disabled:opacity-40 disabled:cursor-not-allowed">
          ${RotaI18n.t('financeiro.next')} <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>`;

      $('pagAnterior').onclick = () => { paginaAtual--; renderTransactions(); };
      $('pagProxima').onclick = () => { paginaAtual++; renderTransactions(); };
      lucide.createIcons();
    }

    // Chave de agrupamento no eixo X conforme a granularidade escolhida —
    // 'dia' preserva 'YYYY-MM-DD', 'mes' corta em 'YYYY-MM', 'ano' em 'YYYY'.
    function chavePeriodo(iso) {
      if (granularidadeChart === 'dia') return iso.slice(0, 10);
      if (granularidadeChart === 'ano') return iso.slice(0, 4);
      return iso.slice(0, 7);
    }

    // Rótulo legível de uma chave de período pro eixo X do gráfico.
    function labelPeriodo(chave) {
      if (granularidadeChart === 'ano') return chave;
      const locale = localeFinanceiro();
      if (granularidadeChart === 'dia') {
        const [ano, mes, dia] = chave.split('-');
        return new Date(Number(ano), Number(mes) - 1, Number(dia))
          .toLocaleDateString(locale, { day: '2-digit', month: 'short' }).replace('.', '');
      }
      const [ano, mes] = chave.split('-');
      return new Date(Number(ano), Number(mes) - 1, 1)
        .toLocaleDateString(locale, { month: 'short', year: '2-digit' }).replace('.', '');
    }

    // Saldo acumulado por moeda, agrupado conforme a granularidade escolhida
    // (dia/mês/ano) — nunca soma moedas diferentes na mesma linha (mesma
    // regra de getSaldoPorMoeda: sem câmbio). Usa o conjunto já filtrado
    // (moeda/período/cliente/agente), então o gráfico sempre reflete
    // exatamente o que a lista abaixo está mostrando.
    async function renderEvolucaoChart() {
      const transacoes = await getTransacoesFiltradas();

      if (!transacoes.length) {
        $('evolucaoChart').classList.add('hidden');
        $('chartEmptyState').classList.remove('hidden');
        $('chartEmptyState').textContent = RotaI18n.t('financeiro.noTransactionsForChart');
        if (evolucaoChartInstance) { evolucaoChartInstance.destroy(); evolucaoChartInstance = null; }
        return;
      }

      $('evolucaoChart').classList.remove('hidden');
      $('chartEmptyState').classList.add('hidden');

      // Variação líquida (receita - despesa) por moeda, por período
      const variacaoPorMoedaPeriodo = {};
      for (const t of transacoes) {
        const chave = chavePeriodo(t.data);
        const sinal = t.tipo === 'receita' ? 1 : -1;
        variacaoPorMoedaPeriodo[t.moeda] = variacaoPorMoedaPeriodo[t.moeda] || {};
        variacaoPorMoedaPeriodo[t.moeda][chave] = (variacaoPorMoedaPeriodo[t.moeda][chave] || 0) + sinal * t.valor;
      }

      // Eixo X compartilhado entre todas as moedas presentes no filtro
      const periodos = [...new Set(transacoes.map(t => chavePeriodo(t.data)))].sort();
      const labels = periodos.map(labelPeriodo);

      const datasets = Object.keys(variacaoPorMoedaPeriodo).map(moeda => {
        let acumulado = 0;
        const pontos = periodos.map(p => (acumulado += variacaoPorMoedaPeriodo[moeda][p] || 0));
        const cor = CORES_HEX_MOEDA[RotaDB.corMoeda(moeda)] || CORES_HEX_MOEDA.ink;
        return {
          label: moeda,
          data: pontos,
          borderColor: cor,
          backgroundColor: cor,
          tension: 0.3,
          pointRadius: 3,
          fill: false,
        };
      });

      if (evolucaoChartInstance) evolucaoChartInstance.destroy();

      evolucaoChartInstance = new Chart($('evolucaoChart'), {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: datasets.length > 1, position: 'bottom', labels: { boxWidth: 12, font: { size: 11 }, color: corTextoChart() } },
            tooltip: {
              callbacks: {
                label: (ctx) => `${ctx.dataset.label}: ${RotaDB.formatCurrency(ctx.parsed.y, ctx.dataset.label)}`,
              },
            },
          },
          scales: {
            y: { ticks: { font: { size: 11 }, color: corTextoChart() }, grid: { color: corGradeChart() } },
            x: { ticks: { font: { size: 11 }, color: corTextoChart() }, grid: { color: corGradeChart() } },
          },
        },
      });
    }

    async function abrirModalTransacao(transacaoExistente = null) {
      const moedasAtivas = await RotaDB.getMoedasAtivas();

      // Sem moeda configurada ainda, não dá pra montar o select de moeda —
      // manda configurar primeiro em vez de abrir um formulário quebrado.
      if (!moedasAtivas.length) {
        await abrirConfigMoedas();
        return;
      }

      const editando = !!transacaoExistente;
      const t = transacaoExistente || {};

      const opcoesClientes = clientesCache
        .map(c => `<option value="${c.id}" ${t.client_id === c.id ? 'selected' : ''}>${escapeHtml(c.nome)}</option>`).join('');

      // Ao editar, a moeda do lançamento pode ter sido desativada depois —
      // garante que ela apareça no select mesmo assim, senão o valor some.
      const moedasParaSelect = t.moeda && !moedasAtivas.includes(t.moeda)
        ? [...moedasAtivas, t.moeda]
        : moedasAtivas;
      const opcoesMoeda = moedasParaSelect
        .map(m => `<option value="${m}" ${t.moeda === m ? 'selected' : ''}>${m} — ${RotaDB.nomeMoeda(m)}</option>`).join('');

      RotaModal.open({
        title: editando ? RotaI18n.t('financeiro.modalTitleEdit') : RotaI18n.t('financeiro.modalTitleNew'),
        submitLabel: editando ? RotaI18n.t('financeiro.modalSubmitEdit') : RotaI18n.t('financeiro.modalSubmitNew'),
        bodyHtml: `
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('financeiro.fieldType')}</label>
              <select id="f_tipo" class="${ROTA_INPUT_CLASS}">
                <option value="receita" ${t.tipo === 'receita' || !editando ? 'selected' : ''}>${RotaI18n.t('financeiro.income')}</option>
                <option value="despesa" ${t.tipo === 'despesa' ? 'selected' : ''}>${RotaI18n.t('financeiro.expense')}</option>
              </select>
            </div>
            <div>
              <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('financeiro.fieldCurrency')}</label>
              <select id="f_moeda" class="${ROTA_INPUT_CLASS}">${opcoesMoeda}</select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('financeiro.fieldValue')}</label>
              <input type="number" id="f_valor" min="0" step="0.01" required value="${t.valor ?? ''}" class="${ROTA_INPUT_CLASS}" placeholder="0.00" />
            </div>
            <div>
              <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('financeiro.fieldExchangeRate')}</label>
              <input type="number" id="f_cambio" min="0" step="0.01" value="${t.taxa_cambio_no_momento ?? 1}" class="${ROTA_INPUT_CLASS}" />
            </div>
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('financeiro.fieldCategory')}</label>
            <input type="text" id="f_categoria" value="${t.categoria || ''}" class="${ROTA_INPUT_CLASS}" placeholder="${RotaI18n.t('financeiro.fieldCategoryPlaceholder')}" />
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('financeiro.fieldClient')}</label>
            <select id="f_cliente" class="${ROTA_INPUT_CLASS}">
              <option value="">${RotaI18n.t('financeiro.fieldClientNone')}</option>
              ${opcoesClientes}
            </select>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('financeiro.fieldCheckIn')} <span class="text-ink/35 font-normal">${RotaI18n.t('financeiro.optional')}</span></label>
              <input type="datetime-local" id="f_checkin" step="1" value="${t.check_in ? t.check_in.slice(0, 19) : ''}" class="${ROTA_INPUT_CLASS}" />
            </div>
            <div>
              <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('financeiro.fieldCheckOut')} <span class="text-ink/35 font-normal">${RotaI18n.t('financeiro.optional')}</span></label>
              <input type="datetime-local" id="f_checkout" step="1" value="${t.check_out ? t.check_out.slice(0, 19) : ''}" class="${ROTA_INPUT_CLASS}" />
            </div>
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('financeiro.fieldNotes')}</label>
            <input type="text" id="f_notas" value="${escapeHtml(t.notas || '')}" class="${ROTA_INPUT_CLASS}" placeholder="${RotaI18n.t('financeiro.fieldNotesPlaceholder')}" />
          </div>
        `,
        onSubmit: async () => {
          const valor = parseFloat($('f_valor').value);
          if (!valor || valor <= 0) { $('f_valor').focus(); return; }

          // Check-in/check-out são opcionais — hora de entrada/saída de um
          // serviço com horário marcado (ex: hotel, transfer, embarque).
          const checkinValor = $('f_checkin').value;
          const checkoutValor = $('f_checkout').value;
          if (checkinValor && checkoutValor && checkoutValor < checkinValor) {
            alert(RotaI18n.t('financeiro.checkoutBeforeCheckin'));
            return;
          }

          const dados = {
            tipo: $('f_tipo').value,
            moeda: $('f_moeda').value,
            valor,
            taxa_cambio_no_momento: parseFloat($('f_cambio').value) || 1,
            categoria: $('f_categoria').value.trim(),
            client_id: $('f_cliente').value || null,
            check_in: checkinValor ? new Date(checkinValor).toISOString() : null,
            check_out: checkoutValor ? new Date(checkoutValor).toISOString() : null,
            notas: $('f_notas').value.trim(),
          };

          if (editando) {
            await RotaDB.updateTransaction(t.id, dados);
          } else {
            await RotaDB.saveTransaction({ ...dados, data: new Date().toISOString() });
          }

          RotaModal.close();
          await renderSaldoCards();
          await renderTransactions();
        },
      });
    }

    async function editarTransacao(id) {
      const transacao = (await RotaDB.getTransactions()).find(t => t.id === id);
      if (!transacao) return;
      await abrirModalTransacao(transacao);
    }

    async function excluirTransacao(id) {
      const transacao = (await RotaDB.getTransactions()).find(t => t.id === id);
      if (!transacao) return;
      const rotulo = transacao.notas || (transacao.tipo === 'receita' ? RotaI18n.t('financeiro.thisIncome') : RotaI18n.t('financeiro.thisExpense'));
      if (!confirm(RotaI18n.t('financeiro.deleteConfirm', { rotulo }))) return;

      await RotaDB.deleteTransaction(id);
      await renderSaldoCards();
      await renderTransactions();
    }

    // Resumo textual dos filtros ativos — usado no topo do PDF exportado,
    // pra quem abrir o arquivo depois saber exatamente o que está vendo.
    function descreverFiltrosAtivos() {
      const partes = [];
      if (moedaFiltro) partes.push(RotaI18n.t('financeiro.filterCurrency', { moeda: moedaFiltro }));
      if ($('dataInicio').value || $('dataFim').value) {
        partes.push(RotaI18n.t('financeiro.filterPeriod', { inicio: $('dataInicio').value || RotaI18n.t('financeiro.noneDash'), fim: $('dataFim').value || RotaI18n.t('financeiro.noneDash') }));
      }
      if ($('clienteFiltro').value) {
        const cliente = clientesCache.find(c => c.id === $('clienteFiltro').value);
        if (cliente) partes.push(RotaI18n.t('financeiro.filterClient', { nome: cliente.nome }));
      }
      if (souAdmin && $('agenteFiltro').value) {
        const agente = equipeCache.find(m => m.id === $('agenteFiltro').value);
        if (agente) partes.push(RotaI18n.t('financeiro.filterAgent', { nome: agente.nome }));
      }
      return partes.length ? partes.join(' · ') : RotaI18n.t('financeiro.noFilters');
    }

    function baixarBlob(blob, nomeArquivo) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = nomeArquivo;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Exporta exatamente o que está filtrado (moeda/período/cliente/agente),
    // ignorando a paginação — quem exporta quer os dados completos do recorte, não só a página visível.
    async function exportarCSV() {
      const transacoes = (await getTransacoesFiltradas()).slice().sort((a, b) => new Date(b.data) - new Date(a.data));
      if (!transacoes.length) { alert(RotaI18n.t('financeiro.noTransactionsToExport')); return; }

      const cabecalho = RotaI18n.t('financeiro.csvHeaders').split(',');
      const linhas = transacoes.map(t => {
        const cliente = t.client_id ? clientesCache.find(c => c.id === t.client_id) : null;
        const agente = equipeCache.find(m => m.id === t.agente_id);
        return [
          t.data.slice(0, 10),
          t.tipo === 'receita' ? RotaI18n.t('financeiro.income') : RotaI18n.t('financeiro.expense'),
          t.moeda,
          t.valor,
          t.taxa_cambio_no_momento,
          t.categoria || '',
          cliente ? cliente.nome : '',
          agente ? agente.nome : '',
          t.check_in ? RotaDB.formatDate(t.check_in, 'datetime') : '',
          t.check_out ? RotaDB.formatDate(t.check_out, 'datetime') : '',
          t.notas || '',
        ];
      });

      // Separador varia por idioma: ";" pra pt-BR/pt-PT (a vírgula já é o
      // separador decimal regional lá), "," pro padrão internacional em inglês.
      const separador = RotaI18n.get() === 'en' ? ',' : ';';
      const csv = [cabecalho, ...linhas]
        .map(linha => linha.map(campo => `"${String(campo).replace(/"/g, '""')}"`).join(separador))
        .join('\r\n');

      // BOM no início garante que acentos abram certo no Excel
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      baixarBlob(blob, `financeiro_${new Date().toISOString().slice(0, 10)}.csv`);
    }

    async function exportarPDF() {
      const transacoes = (await getTransacoesFiltradas()).slice().sort((a, b) => new Date(b.data) - new Date(a.data));
      if (!transacoes.length) { alert(RotaI18n.t('financeiro.noTransactionsToExport')); return; }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(14);
      doc.setTextColor(20, 24, 28);
      doc.text(`${RotaI18n.t('financeiro.title')} — ROTA`, 14, 16);

      doc.setFontSize(9);
      doc.setTextColor(120, 120, 120);
      doc.text(descreverFiltrosAtivos(), 14, 22);
      doc.text(RotaI18n.t('financeiro.generatedOn', { data: new Date().toLocaleDateString(localeFinanceiro()) }), 14, 27);

      const linhas = transacoes.map(t => {
        const cliente = t.client_id ? clientesCache.find(c => c.id === t.client_id) : null;
        return [
          t.data.slice(0, 10),
          t.tipo === 'receita' ? RotaI18n.t('financeiro.income') : RotaI18n.t('financeiro.expense'),
          RotaDB.formatCurrency(t.valor, t.moeda),
          t.categoria || RotaI18n.t('financeiro.noneDash'),
          cliente ? cliente.nome : RotaI18n.t('financeiro.noneDash'),
          t.notas || RotaI18n.t('financeiro.noneDash'),
        ];
      });

      doc.autoTable({
        startY: 32,
        head: [RotaI18n.t('financeiro.pdfHeaders').split(',')],
        body: linhas,
        styles: { fontSize: 8, textColor: [20, 24, 28] },
        headStyles: { fillColor: [31, 75, 76], textColor: [237, 238, 231] },
        alternateRowStyles: { fillColor: [245, 246, 244] },
      });

      doc.save(`financeiro_${new Date().toISOString().slice(0, 10)}.pdf`);
    }

    function atualizarVisibilidadeLimparPeriodo() {
      const ativo = $('dataInicio').value || $('dataFim').value;
      $('limparPeriodo').classList.toggle('hidden', !ativo);
    }

    // ------------------------------------------------------------------
    // Boot: exige sessão real antes de mostrar qualquer dado. Sem isso,
    // dava pra abrir o financeiro direto pela URL sem estar logado.
    // ------------------------------------------------------------------
    (async function boot() {
      const session = await RotaDB.requireSession();
      if (!session) return; // requireSession já redireciona pro login

      renderShell('financeiro');
      RotaI18n.apply();
      document.title = RotaI18n.t('financeiro.pageTitle');
      $('headerMonth').textContent = hoje.toLocaleDateString(localeFinanceiro(), { month: 'short', year: 'numeric' }).replace('.', '').toUpperCase();

      usuarioAtual = await RotaDB.getCurrentUser();
      equipeCache = await RotaDB.getTeam();
      meuMembro = equipeCache.find(m => m.nome === usuarioAtual.nome);
      souAdmin = usuarioAtual.papel === 'admin';
      clientesCache = await RotaDB.getClients();

      await renderSaldoCards();
      await renderMoedaChips();
      renderGranularidadeChips();
      await renderTransactions();

      $('newTransactionBtn').onclick = () => abrirModalTransacao();
      $('exportCsvBtn').onclick = exportarCSV;
      $('exportPdfBtn').onclick = exportarPDF;

      $('dataInicio').addEventListener('change', () => {
        // não deixa "de" ficar depois de "até"
        if ($('dataFim').value && $('dataInicio').value > $('dataFim').value) {
          $('dataFim').value = $('dataInicio').value;
        }
        atualizarVisibilidadeLimparPeriodo();
        paginaAtual = 1;
        renderTransactions();
      });

      $('dataFim').addEventListener('change', () => {
        if ($('dataInicio').value && $('dataFim').value < $('dataInicio').value) {
          $('dataInicio').value = $('dataFim').value;
        }
        atualizarVisibilidadeLimparPeriodo();
        paginaAtual = 1;
        renderTransactions();
      });

      $('limparPeriodo').onclick = () => {
        $('dataInicio').value = '';
        $('dataFim').value = '';
        atualizarVisibilidadeLimparPeriodo();
        paginaAtual = 1;
        renderTransactions();
      };

      // Popula o select de clientes pra todo mundo, e o de agentes só pra admin
      $('clienteFiltro').insertAdjacentHTML('beforeend',
        clientesCache.map(c => `<option value="${c.id}">${escapeHtml(c.nome)}</option>`).join(''));
      $('clienteFiltro').addEventListener('change', () => { paginaAtual = 1; renderTransactions(); });

      if (souAdmin) {
        $('agenteFiltro').insertAdjacentHTML('beforeend',
          equipeCache.map(m => `<option value="${m.id}">${escapeHtml(m.nome)}</option>`).join(''));
        $('agenteFiltro').classList.remove('hidden');
        $('agenteFiltro').addEventListener('change', () => { paginaAtual = 1; renderTransactions(); });
      }

      $('financeiroShell').style.visibility = 'visible';

      RotaI18n.onChange(async () => {
        RotaI18n.apply();
        document.title = RotaI18n.t('financeiro.pageTitle');
        $('headerMonth').textContent = hoje.toLocaleDateString(localeFinanceiro(), { month: 'short', year: 'numeric' }).replace('.', '').toUpperCase();
        await renderSaldoCards();
        await renderMoedaChips();
        renderGranularidadeChips();
        await renderTransactions();
      });
    })();
  </script>
</body>
</html>
