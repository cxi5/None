<!DOCTYPE html>
<html lang="en">
<head>
  <script src="theme.js"></script>
  <script src="i18n.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Recuperar senha — ROTA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            petrol: '#1F4B4C',
            amber:  '#E8A33D',
            clay:   '#C1573A',
            paper:  '#EDEEE7',
            ink:    '#14181C'
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen w-full flex items-center justify-center bg-ticket-field p-4">

  <!-- Toast -->
  <div id="toast" class="fixed top-5 right-5 z-50 hidden items-center gap-3 bg-petrol text-paper px-4 py-3 rounded-md shadow-xl transition-all duration-300 translate-x-full">
    <i data-lucide="check-circle" id="toastIcon" class="w-5 h-5 text-amber flex-shrink-0"></i>
    <span id="toastText" class="text-sm font-medium"></span>
  </div>

  <div class="w-full max-w-[420px] relative">
    <div class="bg-white border border-ink/10 rounded-lg shadow-[0_8px_28px_rgba(20,24,28,0.12)] p-8 pt-9 relative overflow-hidden">

      <!-- carimbo de sucesso, aparece ao enviar -->
      <div id="stampSuccess" class="stamp-pop absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
        <div class="border-[3px] border-clay text-clay font-display text-xl uppercase tracking-widest px-6 py-2 rounded-sm rotate-[-8deg] bg-white/90" data-i18n="common.approved">
          Approved
        </div>
      </div>

      <!-- alternância de idioma -->
      <button id="langToggle" type="button" class="absolute top-3 left-4 font-mono-ticket text-[11px] text-ink/40 hover:text-ink tracking-wider transition px-2 py-1 rounded border border-ink/15" aria-label="Switch language"></button>

      <!-- Nº do bilhete, detalhe decorativo -->
      <div class="absolute top-3 right-4 font-mono-ticket text-[11px] text-ink/40 tracking-wider">
        <span data-i18n="common.ticketPrefix">No.</span> AO-2891-KX
      </div>

      <!-- ESTADO 1: formulário -->
      <div id="formState">
        <div class="text-center mb-7">
          <div class="w-14 h-14 bg-paper stamp-mark rounded-full mx-auto mb-4 flex items-center justify-center">
            <i data-lucide="key-round" class="w-6 h-6 text-petrol"></i>
          </div>
          <h1 class="text-3xl font-display font-semibold text-ink tracking-tight" data-i18n="forgot.title">Reset password</h1>
          <p class="text-ink/50 text-sm mt-1" data-i18n="forgot.subtitle">Enter your account email and we'll send you a link</p>
        </div>

        <form id="forgotForm" novalidate class="space-y-5">
          <div>
            <label for="email" class="text-sm font-medium text-ink/70 mb-2 block" data-i18n="login.emailLabel">Email</label>
            <div class="relative">
              <i data-lucide="mail" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-ink/35 pointer-events-none"></i>
              <input type="email" id="email" required autocomplete="email" aria-describedby="emailError"
                class="w-full bg-white border border-ink/15 rounded-md pl-11 pr-4 py-3.5 text-ink placeholder-ink/35 focus:outline-none input-focus transition-all text-base" />
            </div>
            <p id="emailError" class="text-clay text-xs mt-1.5 h-4"></p>
          </div>

          <button type="submit" id="submitBtn"
            class="btn-ticket w-full bg-amber hover:bg-amber/90 text-ink font-semibold py-3.5 px-4 transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            <span id="btnText" data-i18n="forgot.submit">Send recovery link</span>
            <i data-lucide="loader-2" id="loader" class="w-5 h-5 animate-spin hidden"></i>
          </button>
        </form>
      </div>

      <!-- ESTADO 2: confirmação, depois do envio -->
      <div id="sentState" class="hidden text-center">
        <div class="w-14 h-14 bg-paper stamp-mark rounded-full mx-auto mb-4 flex items-center justify-center">
          <i data-lucide="mail-check" class="w-6 h-6 text-petrol"></i>
        </div>
        <h1 class="text-2xl font-display font-semibold text-ink tracking-tight" data-i18n="forgot.checkEmail">Check your email</h1>
        <p class="text-ink/50 text-sm mt-2 leading-relaxed">
          <span data-i18n="forgot.ifRegisteredPrefix">If</span> <span id="sentEmail" class="font-medium text-ink/70"></span>
          <span data-i18n="forgot.ifRegisteredSuffix">is registered, a recovery link will arrive in a few minutes.</span>
        </p>
        <button id="resendBtn" type="button" class="text-sm text-petrol hover:text-ink transition font-medium mt-5" data-i18n="forgot.resend">
          Didn't get it? Resend
        </button>
      </div>

      <p class="text-center text-sm text-ink/50 mt-8">
        <a href="index.html" class="text-petrol hover:text-ink font-semibold transition inline-flex items-center gap-1.5">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> <span data-i18n="forgot.backToLogin">Back to sign in</span>
        </a>
      </p>

      <div class="barcode mt-7 -mx-8"></div>
    </div>
    <p class="text-center text-xs text-ink/40 mt-6" data-i18n="forgot.prototypeNotice">Prototype — sending not yet connected to the backend</p>
  </div>

  <script>
    RotaI18n.register({
      en: {
        'common.approved': 'Approved',
        'common.ticketPrefix': 'No.',
        'forgot.title': 'Reset password',
        'forgot.subtitle': "Enter your account email and we'll send you a link",
        'login.emailLabel': 'Email',
        'forgot.submit': 'Send recovery link',
        'forgot.submitting': 'Sending...',
        'forgot.checkEmail': 'Check your email',
        'forgot.ifRegisteredPrefix': 'If',
        'forgot.ifRegisteredSuffix': 'is registered, a recovery link will arrive in a few minutes.',
        'forgot.resend': "Didn't get it? Resend",
        'forgot.backToLogin': 'Back to sign in',
        'forgot.prototypeNotice': 'Prototype — sending not yet connected to the backend',
        'forgot.pageTitle': 'Reset password — ROTA',
        'login.errorEmail': 'Enter a valid email',
        'forgot.toastSent': "Link sent, if that email is in our system.",
        'forgot.toastResent': 'Link resent.',
      },
      pt: {
        'common.approved': 'Aprovado',
        'common.ticketPrefix': 'Nº',
        'forgot.title': 'Recuperar senha',
        'forgot.subtitle': 'Informe o email da conta e enviaremos um link',
        'login.emailLabel': 'Email',
        'forgot.submit': 'Enviar link de recuperação',
        'forgot.submitting': 'Enviando...',
        'forgot.checkEmail': 'Verifica teu email',
        'forgot.ifRegisteredPrefix': 'Se',
        'forgot.ifRegisteredSuffix': 'estiver cadastrado, um link de recuperação chega em alguns minutos.',
        'forgot.resend': 'Não recebeu? Reenviar',
        'forgot.backToLogin': 'Voltar ao login',
        'forgot.prototypeNotice': 'Protótipo — envio ainda não conectado ao backend',
        'forgot.pageTitle': 'Recuperar senha — ROTA',
        'login.errorEmail': 'Digite um email válido',
        'forgot.toastSent': 'Link enviado, se o email existir na base.',
        'forgot.toastResent': 'Link reenviado.',
      },
    });

    function aplicarIdioma() {
      RotaI18n.apply();
      document.title = RotaI18n.t('forgot.pageTitle');
      $('langToggle').textContent = RotaI18n.get() === 'pt' ? 'EN' : 'PT';
    }

    lucide.createIcons();
    let isSubmitting = false;

    const $ = (id) => document.getElementById(id);
    const email = $('email');

    aplicarIdioma();
    $('langToggle').onclick = () => { RotaI18n.toggle(); };
    RotaI18n.onChange(aplicarIdioma);

    window.onload = () => email.focus();

    const validateEmail = (val) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);

    const showError = (input, errorEl, message) => {
      input.classList.add('border-clay');
      errorEl.textContent = message;
      input.parentElement.classList.add('shake');
      setTimeout(() => input.parentElement.classList.remove('shake'), 400);
    }
    const clearError = (input, errorEl) => {
      input.classList.remove('border-clay');
      errorEl.textContent = '';
    }

    email.addEventListener('input', () => { if (email.value) clearError(email, $('emailError')); });

    const showToast = (msg, type = 'success') => {
      $('toastText').textContent = msg;
      $('toastIcon').setAttribute('data-lucide', type === 'success' ? 'check-circle' : 'x-circle');
      $('toastIcon').className = `w-5 h-5 flex-shrink-0 ${type === 'success' ? 'text-amber' : 'text-clay'}`;
      $('toast').classList.remove('hidden', 'translate-x-full');
      $('toast').classList.add('flex');
      setTimeout(() => {
        $('toast').classList.add('translate-x-full');
        setTimeout(() => $('toast').classList.add('hidden'), 300);
      }, 3000);
      lucide.createIcons();
    }

    // SEM CHAMADA AO BACKEND: só valida formato e mostra o estado de confirmação.
    // Mensagem genérica de propósito (não confirma se o email existe ou não),
    // pra não vazar quais emails têm conta no sistema.
    $('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSubmitting) return;

      if (!validateEmail(email.value)) {
        showError(email, $('emailError'), RotaI18n.t('login.errorEmail'));
        return;
      }

      isSubmitting = true;
      $('submitBtn').disabled = true;
      $('btnText').textContent = RotaI18n.t('forgot.submitting');
      $('loader').classList.remove('hidden');

      await new Promise(res => setTimeout(res, 800)); // só pra simular uma espera real

      $('stampSuccess').classList.add('show');
      $('sentEmail').textContent = email.value;

      setTimeout(() => {
        $('formState').classList.add('hidden');
        $('sentState').classList.remove('hidden');
        showToast(RotaI18n.t('forgot.toastSent'));
      }, 250);
    });

    $('resendBtn').onclick = () => {
      showToast(RotaI18n.t('forgot.toastResent'));
    };
  </script>
</body>
</html>
