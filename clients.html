<!DOCTYPE html>
<html lang="en">
<head>
  <script src="theme.js"></script>
  <script src="i18n.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clientes — ROTA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            petrol: '#1F4B4C',
            amber:  '#E8A33D',
            clay:   '#C1573A',
            paper:  '#EDEEE7',
            ink:    '#14181C'
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <link rel="stylesheet" href="style.css">
  <script src="data.js"></script>
  <script src="modal.js"></script>
  <style>
    .pb-safe { padding-bottom: calc(84px + env(safe-area-inset-bottom)); }
    @media (min-width: 768px) { .pb-safe { padding-bottom: 2rem; } }
    /* evita "flash" de conteúdo vazio enquanto a sessão é verificada */
    #clientsShell { visibility: hidden; }

    /* selo de status — reaproveita a linguagem do carimbo "Aprovado" do login, em tamanho reduzido */
    .status-stamp {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 8px;
      border: 1.5px solid currentColor;
      border-radius: 3px;
      transform: rotate(-3deg);
      display: inline-block;
      white-space: nowrap;
    }
  </style>
</head>
<body class="min-h-screen bg-ticket-field">

  <div id="clientsShell" class="md:flex">

    <!-- Sidebar + bottom nav agora vêm do shell.js -->
    <div id="shell"></div>

    <!-- Conteúdo principal -->
    <main class="flex-1 pb-safe">

      <!-- Header -->
      <header class="flex items-center justify-between px-5 md:px-8 py-5 border-b border-ink/10 bg-white md:bg-transparent gap-3">
        <div>
          <p id="headerCount" class="font-mono-ticket text-[11px] text-ink/40 tracking-wider mb-0.5">—</p>
          <h1 class="font-display text-2xl font-semibold text-ink" data-i18n="clients.title">Clients</h1>
        </div>
        <button id="newClientBtn" class="btn-ticket bg-amber hover:bg-amber/90 text-ink font-semibold text-sm px-4 py-2.5 flex items-center gap-2 flex-shrink-0">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span class="hidden sm:inline" data-i18n="clients.newClient">New client</span>
        </button>
      </header>

      <div class="px-5 md:px-8 py-6">

        <!-- Busca -->
        <div class="flex flex-col sm:flex-row gap-3 mb-3">
          <div class="relative flex-1 max-w-md">
            <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4.5 h-4.5 text-ink/35 pointer-events-none"></i>
            <input type="text" id="searchInput" data-i18n-placeholder="clients.searchPlaceholder" placeholder="Search client by name or contact..."
              class="w-full bg-white border border-ink/15 rounded-md pl-11 pr-4 py-3 text-sm text-ink placeholder-ink/35 focus:outline-none input-focus" />
          </div>

          <!-- só aparece pra admin — agente só vê os próprios clientes, sem precisar filtrar -->
          <select id="agenteFilter" class="hidden bg-white border border-ink/15 rounded-md px-3.5 py-3 text-sm text-ink focus:outline-none input-focus sm:max-w-[220px]">
            <option value="" data-i18n="clients.allAgents">All agents</option>
          </select>
        </div>

        <!-- Chip de filtro ativo (só aparece se veio de um card do dashboard) -->
        <div id="activeFilterChip" class="hidden mb-4"></div>

        <!-- Lista de clientes -->
        <div id="clientList" class="space-y-4"></div>

        <!-- Paginação — só aparece quando passa de uma página -->
        <div id="pagination" class="hidden items-center justify-between mt-5"></div>
      </div>
    </main>
  </div>

  <script src="shell.js"></script>
  <script>
    RotaI18n.register({
      en: {
        'clients.title': 'Clients',
        'clients.newClient': 'New client',
        'clients.searchPlaceholder': 'Search client by name or contact...',
        'clients.allAgents': 'All agents',
        'clients.pageTitle': 'Clients — ROTA',
        'clients.noAgent': 'no agent',
        'clients.agentPrefix': 'agent:',
        'clients.noContact': 'no contact',
        'clients.itemsPurchased': 'ITEMS PURCHASED',
        'clients.noItemsYet': 'No items registered yet.',
        'clients.noDescription': '(no description)',
        'clients.itemCount': '{{n}} item',
        'clients.itemCount_plural': '{{n}} items',
        'clients.noItems': 'no items',
        'clients.filterPrefix': 'Filter:',
        'clients.previous': 'Previous',
        'clients.next': 'Next',
        'clients.pageOf': 'PAGE {{atual}} OF {{total}}',
        'clients.headerWithItem': '{{n}} WITH {{status}} ITEM',
        'clients.headerRegistered': '{{n}} REGISTERED',
        'clients.noResultsSearch': 'No client found for "{{termo}}".',
        'clients.noResultsFilter': 'No client with that filter.',
        'clients.noResultsEmpty': 'No client registered yet.',
        'clients.modalTitle': 'New client',
        'clients.modalSubmit': 'Save client',
        'clients.fieldName': 'Name *',
        'clients.fieldNamePlaceholder': 'Full name',
        'clients.fieldContact': 'Contact',
        'clients.fieldDocument': 'Document',
        'clients.fieldDocumentPlaceholder': 'ID, passport, tax ID...',
        'clients.fieldLeadOrigin': 'Lead origin',
        'clients.fieldLeadOriginPlaceholder': 'Instagram, referral, etc.',
        'clients.fieldNotes': 'Notes',
        'clients.fieldNotesPlaceholder': 'Notes about the client',
        'status.confirmado': 'Confirmed',
        'status.pendente': 'Pending',
        'status.concluido': 'Completed',
        'status.cancelado': 'Cancelled',
        'status.pendente.filter': 'Pending items',
        'status.confirmado.filter': 'Confirmed',
        'status.concluido.filter': 'Completed',
        'status.cancelado.filter': 'Cancelled',
      },
      pt: {
        'clients.title': 'Clientes',
        'clients.newClient': 'Novo cliente',
        'clients.searchPlaceholder': 'Buscar cliente por nome ou contato...',
        'clients.allAgents': 'Todos os agentes',
        'clients.pageTitle': 'Clientes — ROTA',
        'clients.noAgent': 'sem agente',
        'clients.agentPrefix': 'agente:',
        'clients.noContact': 'sem contato',
        'clients.itemsPurchased': 'ITENS ADQUIRIDOS',
        'clients.noItemsYet': 'Nenhum item registrado ainda.',
        'clients.noDescription': '(sem descrição)',
        'clients.itemCount': '{{n}} item',
        'clients.itemCount_plural': '{{n}} itens',
        'clients.noItems': 'sem itens',
        'clients.filterPrefix': 'Filtro:',
        'clients.previous': 'Anterior',
        'clients.next': 'Próxima',
        'clients.pageOf': 'PÁGINA {{atual}} DE {{total}}',
        'clients.headerWithItem': '{{n}} COM ITEM {{status}}',
        'clients.headerRegistered': '{{n}} CADASTRADO{{plural}}',
        'clients.noResultsSearch': 'Nenhum cliente encontrado para "{{termo}}".',
        'clients.noResultsFilter': 'Nenhum cliente com esse filtro.',
        'clients.noResultsEmpty': 'Nenhum cliente cadastrado ainda.',
        'clients.modalTitle': 'Novo cliente',
        'clients.modalSubmit': 'Salvar cliente',
        'clients.fieldName': 'Nome *',
        'clients.fieldNamePlaceholder': 'Nome completo',
        'clients.fieldContact': 'Contato',
        'clients.fieldDocument': 'Documento',
        'clients.fieldDocumentPlaceholder': 'BI, passaporte, NIF...',
        'clients.fieldLeadOrigin': 'Origem do lead',
        'clients.fieldLeadOriginPlaceholder': 'Instagram, indicação, etc.',
        'clients.fieldNotes': 'Notas',
        'clients.fieldNotesPlaceholder': 'Observações sobre o cliente',
        'status.confirmado': 'Confirmado',
        'status.pendente': 'Pendente',
        'status.concluido': 'Concluído',
        'status.cancelado': 'Cancelado',
        'status.pendente.filter': 'Itens pendentes',
        'status.confirmado.filter': 'Confirmados',
        'status.concluido.filter': 'Concluídos',
        'status.cancelado.filter': 'Cancelados',
      },
    });

    const $ = (id) => document.getElementById(id);

    // Evita XSS quando o texto vem de campo livre digitado pela pessoa
    // (nome de cliente, descrição de item etc.), e não mais de um mock estático.
    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    // Quem está logado (via sessão real do Supabase) e se é admin — decide
    // se mostra o filtro por agente ou já restringe a lista.
    let usuarioAtual = null;
    let meuMembro = null;
    let souAdmin = false;
    let equipeCache = []; // evita re-buscar a equipe a cada card renderizado

    const TAMANHO_PAGINA = 10;
    let paginaAtual = 1;

    const CORES_AVATAR = ['petrol', 'clay', 'amber'];
    const ICONE_TIPO = { roteiro: 'map', ingresso: 'ticket', transfer: 'plane', reserva: 'bed', outro: 'package' };
    const COR_STATUS = { confirmado: 'petrol', pendente: 'amber', concluido: 'ink', cancelado: 'clay' };

    function renderClientCard(cliente, index) {
      const cor = CORES_AVATAR[index % CORES_AVATAR.length];
      const corTexto = cor === 'amber' ? 'text-ink' : 'text-paper';
      const agente = equipeCache.find(m => m.id === cliente.agente_id);
      const nomeAgente = agente ? escapeHtml(agente.nome) : RotaI18n.t('clients.noAgent');

      const itensHtml = cliente.itens.length
        ? cliente.itens.map(item => `
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2.5">
              <i data-lucide="${ICONE_TIPO[item.tipo] || 'package'}" class="w-4 h-4 text-ink/50 flex-shrink-0"></i>
              <span class="text-sm text-ink">${item.descricao ? escapeHtml(item.descricao) : RotaI18n.t('clients.noDescription')}</span>
            </div>
            <span class="status-stamp text-${COR_STATUS[item.status] || 'ink'}">${RotaI18n.t('status.' + item.status) || item.status}</span>
          </div>`).join('')
        : `<p class="text-sm text-ink/40 italic">${RotaI18n.t('clients.noItemsYet')}</p>`;

      const contagem = cliente.itens.length;
      const resumoTexto = contagem
        ? RotaI18n.t(contagem > 1 ? 'clients.itemCount_plural' : 'clients.itemCount', { n: contagem })
        : RotaI18n.t('clients.noItems');

      return `
        <div class="bg-white border border-ink/10 rounded-lg overflow-hidden">
          <div class="flex items-center justify-between px-5 py-4">
            <a href="client.html?id=${cliente.id}" class="flex items-center gap-3 min-w-0 flex-1 hover:opacity-80 transition">
              <div class="w-11 h-11 rounded-full bg-${cor} ${corTexto} flex items-center justify-center font-display font-semibold flex-shrink-0">${RotaDB.initials(cliente.nome)}</div>
              <div class="min-w-0">
                <p class="font-semibold text-ink text-sm truncate">${escapeHtml(cliente.nome)}</p>
                <p class="text-xs text-ink/50 truncate">${cliente.contato ? escapeHtml(cliente.contato) : RotaI18n.t('clients.noContact')} · ${RotaI18n.t('clients.agentPrefix')} ${nomeAgente}</p>
              </div>
            </a>
            <button onclick="toggleClientCard('${cliente.id}')" class="flex items-center gap-1.5 text-ink/40 hover:text-ink transition flex-shrink-0">
              <span class="text-xs font-mono-ticket">${resumoTexto}</span>
              <i id="chevron-${cliente.id}" data-lucide="chevron-down" class="w-5 h-5 transition-transform"></i>
            </button>
          </div>

          <div id="itemsWrap-${cliente.id}" class="hidden">
            <div class="ticket-divider mx-5"></div>

            <div class="px-5 py-4 space-y-3">
              <p class="text-xs font-mono-ticket text-ink/40 tracking-wider mb-1">${RotaI18n.t('clients.itemsPurchased')}</p>
              ${itensHtml}
            </div>

            <div class="barcode mx-5 mb-4"></div>
          </div>
        </div>`;
    }

    // Abre/fecha a lista de itens de um cliente — recolhido por padrão
    // pra lista não ficar gigante quando tiver muito cliente com muito item.
    function toggleClientCard(id) {
      const wrap = document.getElementById(`itemsWrap-${id}`);
      const chevron = document.getElementById(`chevron-${id}`);
      wrap.classList.toggle('hidden');
      chevron.classList.toggle('rotate-180');
    }

    // Filtro vindo de um card do dashboard (ex: clients.html?status=pendente)
    const urlParams = new URLSearchParams(window.location.search);
    const statusFiltro = urlParams.get('status');

    function renderFilterChip() {
      if (!statusFiltro) return;
      $('activeFilterChip').classList.remove('hidden');
      $('activeFilterChip').innerHTML = `
        <span class="inline-flex items-center gap-2 bg-amber/15 border border-amber/40 text-ink text-xs font-medium px-3 py-1.5 rounded-full">
          ${RotaI18n.t('clients.filterPrefix')} ${RotaI18n.t('status.' + statusFiltro + '.filter') || statusFiltro}
          <a href="clients.html" class="text-ink/50 hover:text-clay transition"><i data-lucide="x" class="w-3.5 h-3.5"></i></a>
        </span>`;
      lucide.createIcons();
    }

    async function renderClients() {
      let clientes = await RotaDB.getClients();

      // regra de visibilidade: agente só vê o que é dele, admin vê tudo
      // (ou filtra por um agente específico, se escolher no select)
      if (!souAdmin) {
        clientes = meuMembro ? clientes.filter(c => c.agente_id === meuMembro.id) : [];
      } else if ($('agenteFilter').value) {
        clientes = clientes.filter(c => c.agente_id === $('agenteFilter').value);
      }

      // só mantém clientes que têm pelo menos um item com o status filtrado
      if (statusFiltro) {
        clientes = clientes.filter(c => c.itens.some(i => i.status === statusFiltro));
      }

      // busca por nome ou contato, sem acento/caixa fazendo diferença
      const termo = normalizarTexto($('searchInput').value.trim());
      if (termo) {
        clientes = clientes.filter(c =>
          normalizarTexto(c.nome).includes(termo) ||
          normalizarTexto(c.contato).includes(termo)
        );
      }

      const semResultado = clientes.length === 0;
      const motivoVazio = termo
        ? RotaI18n.t('clients.noResultsSearch', { termo: $('searchInput').value.trim() })
        : (statusFiltro ? RotaI18n.t('clients.noResultsFilter') : RotaI18n.t('clients.noResultsEmpty'));

      $('headerCount').textContent = statusFiltro
        ? RotaI18n.t('clients.headerWithItem', { n: clientes.length, status: (RotaI18n.t('status.' + statusFiltro + '.filter') || statusFiltro).toUpperCase() })
        : RotaI18n.t('clients.headerRegistered', { n: clientes.length, plural: clientes.length === 1 ? '' : 'S' });

      // Paginação — só entra em jogo quando passa de TAMANHO_PAGINA clientes
      const totalPaginas = Math.max(1, Math.ceil(clientes.length / TAMANHO_PAGINA));
      if (paginaAtual > totalPaginas) paginaAtual = totalPaginas;
      const inicio = (paginaAtual - 1) * TAMANHO_PAGINA;
      const clientesPagina = clientes.slice(inicio, inicio + TAMANHO_PAGINA);

      $('clientList').innerHTML = !semResultado
        ? clientesPagina.map(renderClientCard).join('')
        : `<div class="bg-white border border-ink/10 rounded-lg p-8 text-center">
             <i data-lucide="user-${termo ? 'search' : 'plus'}" class="w-8 h-8 text-ink/25 mx-auto mb-2"></i>
             <p class="text-sm text-ink/40">${motivoVazio}</p>
           </div>`;

      renderPagination(totalPaginas);
      lucide.createIcons();
    }

    function renderPagination(totalPaginas) {
      if (totalPaginas <= 1) {
        $('pagination').classList.add('hidden');
        $('pagination').classList.remove('flex');
        return;
      }

      $('pagination').classList.remove('hidden');
      $('pagination').classList.add('flex');
      $('pagination').innerHTML = `
        <button id="pagAnterior" ${paginaAtual === 1 ? 'disabled' : ''}
          class="flex items-center gap-1.5 px-3.5 py-2 rounded-md border border-ink/15 text-sm font-medium text-ink/70 hover:bg-white transition disabled:opacity-40 disabled:cursor-not-allowed">
          <i data-lucide="chevron-left" class="w-4 h-4"></i> ${RotaI18n.t('clients.previous')}
        </button>
        <span class="text-xs font-mono-ticket text-ink/40">${RotaI18n.t('clients.pageOf', { atual: paginaAtual, total: totalPaginas })}</span>
        <button id="pagProxima" ${paginaAtual === totalPaginas ? 'disabled' : ''}
          class="flex items-center gap-1.5 px-3.5 py-2 rounded-md border border-ink/15 text-sm font-medium text-ink/70 hover:bg-white transition disabled:opacity-40 disabled:cursor-not-allowed">
          ${RotaI18n.t('clients.next')} <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>`;

      $('pagAnterior').onclick = () => { paginaAtual--; renderClients(); };
      $('pagProxima').onclick = () => { paginaAtual++; renderClients(); };
      lucide.createIcons();
    }

    // Remove acentos e baixa a caixa, pra "joão" encontrar "Joao" e vice-versa
    function normalizarTexto(texto) {
      return (texto || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function abrirNovoCliente() {
      RotaModal.open({
        title: RotaI18n.t('clients.modalTitle'),
        submitLabel: RotaI18n.t('clients.modalSubmit'),
        bodyHtml: `
          <div>
            <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('clients.fieldName')}</label>
            <input type="text" id="f_nome" required class="${ROTA_INPUT_CLASS}" placeholder="${RotaI18n.t('clients.fieldNamePlaceholder')}" />
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('clients.fieldContact')}</label>
            <input type="text" id="f_contato" class="${ROTA_INPUT_CLASS}" placeholder="+244 900 000 000" />
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('clients.fieldDocument')}</label>
            <input type="text" id="f_documento" class="${ROTA_INPUT_CLASS}" placeholder="${RotaI18n.t('clients.fieldDocumentPlaceholder')}" />
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('clients.fieldLeadOrigin')}</label>
            <input type="text" id="f_origem" class="${ROTA_INPUT_CLASS}" placeholder="${RotaI18n.t('clients.fieldLeadOriginPlaceholder')}" />
          </div>
          <div>
            <label class="${ROTA_LABEL_CLASS}">${RotaI18n.t('clients.fieldNotes')}</label>
            <textarea id="f_notas" rows="3" class="${ROTA_INPUT_CLASS}" placeholder="${RotaI18n.t('clients.fieldNotesPlaceholder')}"></textarea>
          </div>
        `,
        onSubmit: async () => {
          const nome = $('f_nome').value.trim();
          if (!nome) { $('f_nome').focus(); return; }

          await RotaDB.saveClient({
            nome,
            contato: $('f_contato').value.trim(),
            documento: $('f_documento').value.trim(),
            origem_lead: $('f_origem').value.trim(),
            notas: $('f_notas').value.trim(),
          });

          RotaModal.close();
          await renderClients();
        },
      });
    }

    // ------------------------------------------------------------------
    // Boot: exige sessão real antes de mostrar qualquer dado. Sem isso,
    // dava pra abrir a página direto pela URL sem estar logado.
    // ------------------------------------------------------------------
    (async function boot() {
      const session = await RotaDB.requireSession();
      if (!session) return; // requireSession já redireciona pro login

      renderShell('clients');
      RotaI18n.apply();
      document.title = RotaI18n.t('clients.pageTitle');

      usuarioAtual = await RotaDB.getCurrentUser();
      equipeCache = await RotaDB.getTeam();
      meuMembro = equipeCache.find(m => m.nome === usuarioAtual.nome);
      souAdmin = usuarioAtual.papel === 'admin';

      // Popula e exibe o filtro de agente só pra admin
      if (souAdmin) {
        const opcoes = equipeCache.map(m => `<option value="${m.id}">${escapeHtml(m.nome)}</option>`).join('');
        $('agenteFilter').insertAdjacentHTML('beforeend', opcoes);
        $('agenteFilter').classList.remove('hidden');
        $('agenteFilter').addEventListener('change', () => { paginaAtual = 1; renderClients(); });
      }

      renderFilterChip();
      await renderClients();

      $('clientsShell').style.visibility = 'visible';

      $('searchInput').addEventListener('input', () => { paginaAtual = 1; renderClients(); });
      $('newClientBtn').onclick = abrirNovoCliente;

      RotaI18n.onChange(async () => {
        RotaI18n.apply();
        document.title = RotaI18n.t('clients.pageTitle');
        renderFilterChip();
        await renderClients();
      });
    })();
  </script>
</body>
</html>
